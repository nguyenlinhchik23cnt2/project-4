spring.application.name=dogiadung

# ================== DATABASE ==================
spring.datasource.url=jdbc:sqlserver://127.0.0.1:1433;databaseName=CHGiaDung;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=163271
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ================== JPA ==================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# ================== SERVER ==================
server.port=8080

# ================== SECURITY (TẮT HOÀN TOÀN) ==================
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration,org.springframework.boot.autoconfigure.security.servlet.SecurityFilterAutoConfiguration

# ================== FILE UPLOAD ==================
file.upload-dir=C:/project4/uploads/products
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Tắt banner và log thừa (tùy chọn)
spring.main.banner-mode=off
logging.level.org.springframework=ERROR
# Thêm dòng này để Hibernate dùng sequence đúng cách
spring.jpa.properties.hibernate.generator.use_nio=true

