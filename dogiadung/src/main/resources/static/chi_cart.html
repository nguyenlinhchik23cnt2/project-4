<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ Hàng - TNC Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --olive: #4a7043;
            --olive-d: #3a5a34;
            --red: #e11d48;
        }
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background: #f7f6f2;
        }
        .cart-item {
            border-bottom: 1px solid #e0ddd7;
            padding: 16px 0;
        }
        .cart-item:last-child {
            border-bottom: none;
        }
        .section {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(74,112,67,.08);
            padding: 28px;
            margin-bottom: 24px;
        }
        .btn-olive {
            background: var(--olive);
            color: white;
        }
        .btn-olive:hover { background: var(--olive-d); }
        .total-amount {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--red);
        }
    </style>
</head>
<body>

<!-- Header -->
<header class="header-inner bg-white shadow-sm">
    <div class="header-inner d-flex align-items-center justify-content-between px-4 py-3">
        <a href="index.html" class="brand d-flex align-items-center gap-2 text-decoration-none">
            <div style="background:var(--olive); width:42px; height:42px; border-radius:10px; display:flex; align-items:center; justify-content:center;">
                <i class="fas fa-home text-white"></i>
            </div>
            <div class="brand-name">TNC Shop</div>
        </a>
        <h4 class="mb-0 fw-bold"> Giỏ Hàng Của Bạn</h4>
        <a href="index.html" class="btn btn-outline-secondary">Tiếp tục mua sắm</a>
    </div>
</header>

<div class="container py-5" style="max-width:1100px;">

    <div class="section">
        <h5 class="mb-4 fw-bold"><i class="fas fa-shopping-cart me-2"></i>Sản phẩm trong giỏ hàng</h5>

        <div id="cartItems"></div>

        <!-- Tổng tiền -->
        <div class="d-flex justify-content-between align-items-center mt-4 pt-4 border-top">
            <h5 class="mb-0">Tổng cộng:</h5>
            <div class="total-amount" id="totalAmount">0 ₫</div>
        </div>

        <div class="text-end mt-4">
            <button onclick="checkout()" class="btn btn-olive btn-lg px-5">
               Tiến hành thanh toán
            </button>
        </div>
    </div>

</div>

<script>
    const API = "http://localhost:8080/api/cart";
    const PRODUCT_API = "http://localhost:8080/api/products";

    // Giả sử khách hàng đã đăng nhập - Bạn có thể lấy từ localStorage sau
    let currentCustomerId = 1;   // ← Thay đổi theo khách hàng thực tế

    let products = [];

    async function loadProducts() {
        try {
            const res = await fetch(PRODUCT_API);
            products = await res.json();
            const select = document.getElementById("productSelect");
            select.innerHTML = `<option value="">-- Chọn sản phẩm --</option>`;
            products.forEach(p => {
                select.innerHTML += `<option value="${p.productId}">${p.name} - ${Number(p.price).toLocaleString('vi-VN')}₫</option>`;
            });
        } catch(e) {
            console.error(e);
        }
    }

    async function loadCart() {
        try {
            const res = await fetch(`${API}/${currentCustomerId}`);
            const cartData = await res.json();
            renderCart(cartData);
        } catch(e) {
            console.error(e);
            document.getElementById("cartItems").innerHTML = `<p class="text-center text-muted">Không thể tải giỏ hàng</p>`;
        }
    }

    function renderCart(cart) {
        let html = '';
        let total = 0;

        if (cart.length === 0) {
            html = `<div class="text-center py-5 text-muted">
                        <i class="fas fa-shopping-cart fa-3x mb-3"></i>
                        <p>Giỏ hàng của bạn đang trống</p>
                    </div>`;
        } else {
            cart.forEach(item => {
                const subtotal = (item.price || 0) * item.quantity;
                total += subtotal;

                html += `
                <div class="cart-item d-flex align-items-center">
                    <img src="${item.imageUrl || 'https://via.placeholder.com/80'}"
                         style="width:80px;height:80px;object-fit:cover;border-radius:8px;" class="me-3">
                    <div class="flex-grow-1">
                        <h6 class="mb-1">${item.productName}</h6>
                        <p class="text-muted mb-1">${Number(item.price).toLocaleString('vi-VN')}₫</p>
                        <div class="d-flex align-items-center gap-3">
                            <button class="btn btn-sm btn-outline-secondary" onclick="changeQuantity(${item.productId}, -1)">−</button>
                            <strong>${item.quantity}</strong>
                            <button class="btn btn-sm btn-outline-secondary" onclick="changeQuantity(${item.productId}, 1)">+</button>
                        </div>
                    </div>
                    <div class="text-end">
                        <div class="fw-bold">${subtotal.toLocaleString('vi-VN')}₫</div>
                        <button class="btn btn-link text-danger p-0 mt-2" onclick="removeItem(${item.productId})">
                            <i class="fas fa-trash"></i> Xóa
                        </button>
                    </div>
                </div>`;
            });
        }

        document.getElementById("cartItems").innerHTML = html;
        document.getElementById("totalAmount").textContent = total.toLocaleString('vi-VN') + ' ₫';
    }

    async function addToCartFromSelect() {
        const productId = document.getElementById("productSelect").value;
        const quantity = parseInt(document.getElementById("addQuantity").value) || 1;

        if (!productId) return alert("Vui lòng chọn sản phẩm!");

        try {
            await fetch(`${API}/add?customerId=${currentCustomerId}&productId=${productId}&quantity=${quantity}`, {
                method: "POST"
            });
            alert(" Đã thêm vào giỏ hàng!");
            loadCart();
        } catch(e) {
            alert("Lỗi khi thêm sản phẩm!");
        }
    }

    async function changeQuantity(productId, change) {
        // Logic này nên gọi API update, nhưng tạm thời reload sau update
        try {
            // Giả sử bạn có endpoint update
            await fetch(`${API}/update?customerId=${currentCustomerId}&productId=${productId}&quantity=1`, { method: "PUT" });
            // Thực tế bạn cần lấy quantity hiện tại rồi + change
            loadCart();
        } catch(e) {}
    }

    async function removeItem(productId) {
        if (!confirm("Xóa sản phẩm này khỏi giỏ hàng?")) return;

        try {
            await fetch(`${API}/remove?customerId=${currentCustomerId}&productId=${productId}`, {
                method: "DELETE"
            });
            loadCart();
        } catch(e) {
            alert("Lỗi khi xóa!");
        }
    }

    function checkout() {
        if (confirm("Tiến hành thanh toán cho đơn hàng này?")) {
            window.location.href = "checkout.html";   // Bạn sẽ tạo sau
        }
    }

    // Khởi tạo trang
    window.onload = () => {
        loadProducts();
        loadCart();
    };
</script>

</body>
</html>
