<script>
    const API_URL = "http://localhost:8080/categories";


    async function loadAllCategories() {
        const tbody = document.getElementById('categoriesTable');
        tbody.innerHTML = `<tr><td colspan="5" class="text-center py-12 text-gray-400"><i class="fas fa-spinner fa-spin text-2xl"></i><br>Đang tải dữ liệu...</td></tr>`;

        try {
            const res = await fetch(API_URL);
            if (!res.ok) throw new Error('Lỗi server');

            const data = await res.json();
            console.log("Dữ liệu nhận được:", data); // Debug
            renderTable(data);
            loadParentOptions(data);
        } catch (error) {
            console.error(error);
            tbody.innerHTML = `<tr><td colspan="5" class="text-center py-12 text-red-500"> Không tải được dữ liệu</td></tr>`;
        }
    }

    function renderTable(data) {
        const tbody = document.getElementById('categoriesTable');
        tbody.innerHTML = '';
        document.getElementById('totalCount').textContent = `${data.length} danh mục`;

        if (data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" class="text-center py-12 text-gray-400">Chưa có danh mục nào. Hãy thêm danh mục đầu tiên!</td></tr>`;
            return;
        }

        data.sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0));

        data.forEach(c => {
            const tr = document.createElement('tr');
            tr.className = "hover:bg-emerald-50 transition-colors";
            tr.innerHTML = `
                    <td class="px-6 py-4 font-medium">${c.name}</td>
                    <td class="px-6 py-4 text-gray-500">${c.parent ? c.parent.name : '<span class="text-emerald-600">Root</span>'}</td>
                    <td class="px-6 py-4 text-center">${c.sortOrder || 0}</td>
                    <td class="px-6 py-4 text-center">
                        <span class="px-3 py-1 rounded-full text-xs font-medium ${c.status === 'active' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                            ${c.status === 'active' ? 'Hoạt động' : 'Không hoạt động'}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-center space-x-3">
                        <button onclick="editCategory(${c.categoryId})" class="text-amber-600 hover:text-amber-700"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteCategory(${c.categoryId})" class="text-red-600 hover:text-red-700"><i class="fas fa-trash"></i></button>
                    </td>
                `;
            tbody.appendChild(tr);
        });
    }

    async function loadParentOptions(data) {
        const select = document.getElementById('parentId');
        select.innerHTML = '<option value="">-- Danh mục gốc (Root) --</option>';
        data.forEach(cat => {
            const opt = document.createElement('option');
            opt.value = cat.categoryId;
            opt.textContent = cat.name;
            select.appendChild(opt);
        });
    }

    async function createOrUpdateCategory() {
        const id = document.getElementById('categoryId').value;
        const category = {
            name: document.getElementById('name').value.trim(),
            description: document.getElementById('description').value.trim(),
            imageUrl: document.getElementById('imageUrl').value.trim(),
            sortOrder: parseInt(document.getElementById('sortOrder').value) || 0,
            status: document.getElementById('status').value,
            parent: document.getElementById('parentId').value ? { categoryId: parseInt(document.getElementById('parentId').value) } : null
        };

        if (!category.name) return alert("Vui lòng nhập tên danh mục!");

        try {
            const url = id ? `${API_URL}/${id}` : API_URL;
            const res = await fetch(url, {
                method: id ? 'PUT' : 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(category)
            });

            if (res.ok) {
                alert(id ? " Cập nhật thành công!" : " Thêm danh mục thành công!");
                resetForm();
                loadAllCategories();
            } else {
                alert(" Lỗi khi lưu!");
            }
        } catch (e) {
            alert(" Lỗi kết nối!");
        }
    }

    async function editCategory(id) {
        try {
            const res = await fetch(`${API_URL}/${id}`);
            const c = await res.json();
            document.getElementById('categoryId').value = c.categoryId;
            document.getElementById('name').value = c.name || '';
            document.getElementById('description').value = c.description || '';
            document.getElementById('imageUrl').value = c.imageUrl || '';
            document.getElementById('sortOrder').value = c.sortOrder || 0;
            document.getElementById('status').value = c.status || 'active';
            document.getElementById('parentId').value = c.parent ? c.parent.categoryId : '';
        } catch (e) {
            alert("Không tìm thấy danh mục!");
        }
    }

    async function deleteCategory(id) {
        if (!confirm("Xóa danh mục này?")) return;
        try {
            await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            alert(" Xóa thành công!");
            loadAllCategories();
        } catch (e) {
            alert("Lỗi khi xóa!");
        }
    }

    function resetForm() {
        document.getElementById('categoryId').value = '';
        document.getElementById('name').value = '';
        document.getElementById('description').value = '';
        document.getElementById('imageUrl').value = '';
        document.getElementById('sortOrder').value = '0';
        document.getElementById('status').value = 'active';
        document.getElementById('parentId').value = '';
    }

    window.onload = checkBackend;
</script>
