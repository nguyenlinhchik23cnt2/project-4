<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TNC Shop - Thông Tin Tài Khoản</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        .profile-card {
            transition: all 0.3s ease;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen">

<div class="max-w-7xl mx-auto p-6">

    <!-- HEADER -->
    <div class="flex items-center justify-between mb-8 bg-white p-6 rounded-3xl shadow-sm">

        <div class="flex items-center gap-3">

            <div class="w-12 h-12 bg-emerald-600 rounded-2xl flex items-center justify-center text-white text-2xl shadow-md">
                <i class="fa-solid fa-users-gear"></i>
            </div>

            <div>
                <h1 class="text-2xl font-bold text-gray-800">
                    TNC Shop
                </h1>

                <p class="text-sm text-gray-500">
                    Hồ sơ khách hàng
                </p>
            </div>

        </div>

        <button onclick="window.location.href='index.html'"
                class="px-5 py-2.5 bg-white border border-emerald-200 text-emerald-600 rounded-2xl hover:bg-emerald-50 transition flex items-center gap-2 font-medium">

            <i class="fas fa-house"></i>
            Trang chủ

        </button>

    </div>

    <!-- FORM CENTER -->
    <div class="flex justify-center">

        <div class="w-full max-w-3xl">

            <div class="profile-card bg-white rounded-3xl shadow-xl p-8 border border-gray-100 mx-auto">

                <!-- AVATAR -->
                <div class="flex flex-col items-center mb-6">

                    <div class="w-28 h-28 bg-gradient-to-br from-emerald-100 to-teal-100 rounded-3xl flex items-center justify-center text-6xl shadow-inner border-4 border-white overflow-hidden">
                        👤
                    </div>

                    <h2 id="formTitle"
                        class="text-2xl font-bold text-gray-800 mt-4 flex items-center gap-2">

                        Thông tin tài khoản

                    </h2>

                </div>

                <input type="hidden" id="customerId">

                <!-- FORM -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">

                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">
                            Username
                        </label>

                        <input type="text"
                               id="username"
                               placeholder="Nhập tên đăng nhập"
                               class="w-full px-4 py-3 border border-gray-200 rounded-2xl text-sm">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">
                            Họ và tên
                        </label>

                        <input type="text"
                               id="fullName"
                               placeholder="Nhập đầy đủ họ tên"
                               class="w-full px-4 py-3 border border-gray-200 rounded-2xl text-sm">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">
                            Số điện thoại
                        </label>

                        <input type="text"
                               id="phone"
                               placeholder="0987..."
                               class="w-full px-4 py-3 border border-gray-200 rounded-2xl text-sm">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">
                            Email
                        </label>

                        <input type="email"
                               id="email"
                               placeholder="example@gmail.com"
                               class="w-full px-4 py-3 border border-gray-200 rounded-2xl text-sm">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">
                            Ngày sinh
                        </label>

                        <input type="date"
                               id="dob"
                               class="w-full px-4 py-3 border border-gray-200 rounded-2xl text-sm">
                    </div>

                </div>

                <!-- ADDRESS -->
                <div class="mt-5">

                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">
                        Địa chỉ thường trú
                    </label>

                    <textarea id="address"
                              rows="3"
                              placeholder="Số nhà, tên đường..."
                              class="w-full px-4 py-3 border border-gray-200 rounded-2xl text-sm resize-none"></textarea>

                </div>

                <!-- BUTTON -->
                <div class="flex justify-center mt-8">

                    <button onclick="createOrUpdateCustomer()"
                            class="bg-emerald-600 hover:bg-emerald-700 text-white px-10 py-3.5 rounded-2xl font-bold flex items-center justify-center gap-2 transition shadow-md">

                        <i class="fa-solid fa-floppy-disk"></i>
                        LƯU THÔNG TIN

                    </button>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

    const API_URL = "http://localhost:8080/api/customers";

    // LOAD INFO FROM LOGIN
    function loadCustomerInfo() {

        const user = JSON.parse(localStorage.getItem('currentUser'));

        if (!user) {

            alert("Bạn chưa đăng nhập!");

            window.location.href = "login.html";

            return;
        }

        document.getElementById('customerId').value =
            user.customerId || user.userId || user.id || '';

        document.getElementById('username').value =
            user.username || '';

        document.getElementById('fullName').value =
            user.fullName || '';

        document.getElementById('phone').value =
            user.phone || '';

        document.getElementById('email').value =
            user.email || '';

        document.getElementById('address').value =
            user.address || '';

        if (user.dob) {
            document.getElementById('dob').value =
                user.dob.split('T')[0];
        }

        // khóa username
        document.getElementById('username')
            .setAttribute('readonly', true);

        document.getElementById('username')
            .classList.add('bg-gray-100');

        // title
        document.getElementById('formTitle').innerHTML =
            `<i class="fa-solid fa-user text-emerald-600"></i> Hồ Sơ Cá Nhân`;
    }

    // UPDATE CUSTOMER
    async function createOrUpdateCustomer() {

        const id = document.getElementById('customerId').value;

        if (!id) {
            alert("Không tìm thấy ID khách hàng!");
            return;
        }

        const customer = {
            customerId: id,

            username: document.getElementById('username').value.trim(),

            fullName: document.getElementById('fullName').value.trim(),

            phone: document.getElementById('phone').value.trim(),

            email: document.getElementById('email').value.trim(),

            address: document.getElementById('address').value.trim(),

            dob: document.getElementById('dob').value || null
        };

        try {

            const response = await fetch(`${API_URL}/${id}`, {

                method: 'PUT',

                headers: {
                    'Content-Type': 'application/json'
                },

                body: JSON.stringify(customer)

            });

            if (response.ok) {

                alert("🎉 Cập nhật thông tin thành công!");

                // update localStorage
                localStorage.setItem(
                    'currentUser',
                    JSON.stringify({
                        ...JSON.parse(localStorage.getItem('currentUser')),
                        ...customer
                    })
                );

                // quay về trang chủ
                window.location.href = "index.html";}

            else {

                const errorText = await response.text();

                console.error(errorText);

                alert("❌ Cập nhật thất bại!");

            }

        } catch (error) {

            console.error(error);

            alert("❌ Lỗi kết nối server!");

        }
    }
    function logout() {

        // xóa dữ liệu đăng nhập
        localStorage.removeItem('currentUser');
        localStorage.removeItem('userRole');
        localStorage.removeItem('customerId');
        localStorage.removeItem('fullName');
        localStorage.removeItem('username');

        // chuyển về login
        window.location.href = "login.html";
    }

    // RESET
    function resetForm() {

        loadCustomerInfo();

    }

    window.onload = function () {

        const user = localStorage.getItem('currentUser');

        // chưa login
        if (!user) {

            window.location.replace("login.html");

            return;
        }

        loadCustomerInfo();
    };

</script>

</body>
</html>
