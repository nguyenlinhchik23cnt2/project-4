<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TNC Shop - Quản Lý Khách Hàng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; }
        .card { transition: all 0.3s ease; }
        .card:hover { box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
<div class="max-w-7xl mx-auto p-6">

    <div class="flex items-center justify-between mb-8 bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-emerald-600 rounded-2xl flex items-center justify-center text-white text-2xl shadow-md">
                <i class="fa-solid fa-users-gear"></i>
            </div>
            <div>
                <h1 class="text-2xl font-bold text-gray-800">TNC Shop</h1>
                <p class="text-xs text-gray-500 font-semibold uppercase tracking-wider">Hệ thống quản lý hồ sơ khách hàng</p>
            </div>
        </div>
        <button onclick="loadAllCustomers()" class="px-5 py-2.5 bg-white border border-emerald-200 text-emerald-600 rounded-2xl hover:bg-emerald-50 transition flex items-center gap-2 font-medium">
            <i class="fas fa-sync"></i> Tải lại dữ liệu
        </button>
    </div>

    <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 mb-8 flex flex-col md:flex-row gap-4 items-center justify-between">
        <div class="flex flex-1 w-full md:w-auto gap-3">
            <div class="relative flex-1">
                <i class="fas fa-search absolute left-4 top-3.5 text-gray-400"></i>
                <input type="text" id="searchKeyword" placeholder="Tìm kiếm theo họ tên, số điện thoại, email, địa chỉ..."
                       class="w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none">
            </div>
            <select id="filterGender" class="px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none bg-white font-medium text-gray-600">
                <option value="">-- Tất cả giới tính --</option>
                <option value="Nam">Nam</option>
                <option value="Nữ">Nữ</option>
                <option value="Khác">Khác</option>
            </select>
        </div>
        <button onclick="searchCustomers()" class="w-full md:w-auto px-6 py-2.5 bg-emerald-600 text-white font-bold rounded-xl hover:bg-emerald-700 transition text-sm">
            <i class="fa-solid fa-filter mr-1"></i> LỌC KẾT QUẢ
        </button>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        <div class="lg:col-span-5">
            <div class="card bg-white rounded-3xl shadow-xl p-8 sticky top-6 border border-gray-100">
                <h2 id="formTitle" class="text-xl font-semibold text-gray-800 mb-6 flex items-center gap-2">
                    <i class="fa-solid fa-user-plus text-emerald-600"></i>
                    Thêm Khách Hàng Mới
                </h2>

                <input type="hidden" id="customerId">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Username <span class="text-red-500">*</span></label>
                        <input type="text" id="username" placeholder="Nhập tên đăng nhập" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Họ và Tên <span class="text-red-500">*</span></label>
                        <input type="text" id="fullName" placeholder="Nhập đầy đủ họ tên" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Số Điện Thoại</label>
                        <input type="text" id="phone" placeholder="Ví dụ: 0987..." class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Email</label>
                        <input type="email" id="email" placeholder="example@gmail.com" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Giới Tính</label>
                        <select id="gender" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none bg-white">
                            <option value="">-- Chọn giới tính --</option>
                            <option value="Nam">Nam</option>
                            <option value="Nữ">Nữ</option>
                            <option value="Khác">Khác</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Ngày Sinh</label>
                        <input type="date" id="dob" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none">
                    </div>
                </div>

                <div class="mt-4">
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Địa chỉ thường trú</label>
                    <textarea id="address" rows="3" placeholder="Số nhà, tên đường, phường/xã, quận/huyện..." class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none resize-none"></textarea>
                </div>

                <div class="flex gap-3 mt-6">
                    <button onclick="createOrUpdateCustomer()" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition text-sm shadow-md">
                        <i class="fa-solid fa-floppy-disk"></i> LƯU THÔNG TIN
                    </button>
                    <button onclick="resetForm()" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition text-sm">
                        <i class="fas fa-undo"></i> LÀM MỚI
                    </button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-7">
            <div class="card bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
                <div class="px-8 py-5 border-b flex items-center justify-between bg-gray-50">
                    <h2 class="font-bold text-gray-700 text-lg">Danh sách tài khoản</h2>
                    <span id="totalCount" class="text-xs bg-slate-200 text-slate-700 px-3 py-1 rounded-full font-bold">0 khách hàng</span>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead class="bg-gradient-to-r from-emerald-600 to-teal-600 text-white">
                        <tr class="text-left">
                            <th class="px-4 py-4 text-center font-bold w-12">STT</th>
                            <th class="px-4 py-4 font-bold">Tài khoản</th>
                            <th class="px-4 py-4 font-bold">Họ và Tên</th>
                            <th class="px-4 py-4 font-bold">Liên hệ</th>
                            <th class="px-4 py-4 text-center font-bold">Giới tính</th>
                            <th class="px-4 py-4 text-center font-bold">Hành động</th>
                        </tr>
                        </thead>
                        <tbody id="customersTable" class="divide-y divide-gray-100 text-gray-700"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ĐÃ SỬA: Đồng bộ khớp đường dẫn chứa tiền tố /api
    const API_URL = "http://localhost:8080/api/customers";

    // 1. Tải danh sách khách hàng từ Backend
    async function loadAllCustomers(urlParams = "") {
        const tbody = document.getElementById('customersTable');
        tbody.innerHTML = `<tr><td colspan="6" class="text-center py-12 text-gray-400"><i class="fas fa-spinner fa-spin text-2xl mb-2 text-emerald-600"></i><br>Đang tìm dữ liệu...</td></tr>`;

        try {
            const res = await fetch(`${API_URL}${urlParams}`);
            if (!res.ok) throw new Error('Lỗi server');
            const data = await res.json();

            // Xếp ID mới lên đầu
            data.sort((a, b) => b.customerId - a.customerId);
            renderTable(data);
        } catch (error) {
            console.error(error);
            tbody.innerHTML = `<tr><td colspan="6" class="text-center py-12 text-red-500 font-semibold"><i class="fa-solid fa-triangle-exclamation mr-1"></i> Không kết nối được API Backend!</td></tr>`;
        }
    }

    // 2. Kích hoạt bộ lọc tìm kiếm
    function searchCustomers() {
        const keyword = document.getElementById('searchKeyword').value.trim();
        const gender = document.getElementById('filterGender').value;

        let queryParams = `?keyword=${encodeURIComponent(keyword)}&gender=${gender}`;
        loadAllCustomers(queryParams);
    }

    // 3. Đổ dữ liệu khách hàng vào thẻ <tr>
    function renderTable(data) {
        const tbody = document.getElementById('customersTable');
        tbody.innerHTML = '';
        document.getElementById('totalCount').textContent = `${data.length} khách hàng`;

        if (data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" class="text-center py-12 text-gray-400">Không tìm thấy khách hàng nào.</td></tr>`;
            return;
        }

        data.forEach((c, i) => {
            const row = document.createElement('tr');
            row.className = "hover:bg-emerald-50/50 transition-colors";
            row.innerHTML = `
                    <td class="px-4 py-4 text-center font-bold text-gray-400">${i + 1}</td>
                    <td class="px-4 py-4 font-semibold text-emerald-700">${c.username || '—'}</td>
                    <td class="px-4 py-4 font-bold text-gray-800">${c.fullName}</td>
                    <td class="px-4 py-4 text-xs space-y-0.5">
                        <div class="text-gray-600 font-medium"><i class="fa-solid fa-phone text-gray-400 mr-1"></i>${c.phone || 'Chưa cập nhật'}</div>
                        <div class="text-gray-400"><i class="fa-solid fa-envelope text-gray-400 mr-1"></i>${c.email || '—'}</div>
                    </td>
                    <td class="px-4 py-4 text-center"><span class="bg-slate-100 text-slate-700 px-2 py-0.5 rounded-md font-medium text-xs">${c.gender || '—'}</span></td>
                    <td class="px-4 py-4 text-center space-x-1.5 flex items-center justify-center">
                        <button onclick="editCustomer(${c.customerId})" class="text-amber-600 hover:text-amber-700 p-2 transition" title="Sửa hồ sơ"><i class="fas fa-edit text-base"></i></button>
                        <button onclick="deleteCustomer(${c.customerId})" class="text-red-600 hover:text-red-700 p-2 transition" title="Xóa hồ sơ"><i class="fas fa-trash text-base"></i></button>
                    </td>
                `;
            tbody.appendChild(row);
        });
    }

    // 4. THÊM HOẶC CẬP NHẬT THÔNG TIN KHÁCH HÀNG (POST / PUT)
    async function createOrUpdateCustomer() {
        const id = document.getElementById('customerId').value;
        const customer = {
            username: document.getElementById('username').value.trim(),
            fullName: document.getElementById('fullName').value.trim(),
            phone: document.getElementById('phone').value.trim(),
            email: document.getElementById('email').value.trim(),
            address: document.getElementById('address').value.trim(),
            dob: document.getElementById('dob').value || null,
            gender: document.getElementById('gender').value
        };

        if (!customer.username) return alert("Vui lòng nhập tên tài khoản (Username)!");
        if (!customer.fullName) return alert("Vui lòng nhập họ và tên khách hàng!");

        try {
            const url = id ? `${API_URL}/${id}` : API_URL;
            const method = id ? 'PUT' : 'POST';

            const res = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(customer)
            });

            if (res.ok) {
                alert(id ? "🎉 Cập nhật thông tin hồ sơ khách hàng thành công!" : "🎉 Đăng ký thông tin khách hàng mới thành công!");
                resetForm();
                loadAllCustomers();
            } else {
                const errData = await res.json();
                alert("Lỗi: " + (errData.message || "Thao tác lưu thất bại."));
            }
        } catch (e) {
            console.error(e);
            alert("Lỗi kết nối máy chủ API!");
        }
    }

    // 5. ĐỌC CHI TIẾT LÊN FORM ĐỂ CHUẨN BỊ SỬA
    async function editCustomer(id) {
        try {
            const res = await fetch(`${API_URL}/${id}`);
            const c = await res.json();

            document.getElementById('customerId').value = c.customerId;
            document.getElementById('username').value = c.username || '';
            // KHÔNG cho phép sửa username khi cập nhật
            document.getElementById('username').setAttribute('readonly', true);
            document.getElementById('username').classList.add('bg-gray-100');

            document.getElementById('fullName').value = c.fullName || '';
            document.getElementById('phone').value = c.phone || '';
            document.getElementById('email').value = c.email || '';
            document.getElementById('address').value = c.address || '';
            document.getElementById('gender').value = c.gender || '';

            if (c.dob) {
                document.getElementById('dob').value = c.dob.split('T')[0];
            }

            document.getElementById('formTitle').innerHTML = `<i class="fa-solid fa-user-pen text-amber-600"></i> Cập Nhật Khách Hàng`;
        } catch (e) {
            alert("Không tìm thấy thông tin khách hàng!");
        }
    }

    // 6. XÓA HỒ SƠ KHÁCH HÀNG (DELETE)
    async function deleteCustomer(id) {
        if (!confirm("Bạn có chắc chắn muốn xóa vĩnh viễn khách hàng này khỏi hệ thống?")) return;
        try {
            const res = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            const result = await res.json();

            if (res.ok && result.success) {
                alert(result.message);
                loadAllCustomers();
            } else {
                alert(result.message || "Không thể thực hiện lệnh xóa!");
            }
        } catch (e) {
            alert("Lỗi hệ thống khi xóa dữ liệu!");
        }
    }

    // 7. RESET TRỐNG FORM
    function resetForm() {
        document.getElementById('customerId').value = '';
        document.getElementById('username').value = '';
        document.getElementById('username').removeAttribute('readonly');
        document.getElementById('username').classList.remove('bg-gray-100');

        document.getElementById('fullName').value = '';
        document.getElementById('phone').value = '';
        document.getElementById('email').value = '';
        document.getElementById('address').value = '';
        document.getElementById('dob').value = '';
        document.getElementById('gender').value = '';

        document.getElementById('formTitle').innerHTML = `<i class="fa-solid fa-user-plus text-emerald-600"></i> Thêm Khách Hàng Mới`;
    }

    window.onload = function() {
        loadAllCustomers();
    };
</script>
</body>
</html>
