<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop NgaTràChi - Đồ Gia Dụng Thông Minh</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #4a7043;      /* Olive chính - màu chủ đạo mới */
            --primary-hover: #3f5f38;      /* Olive đậm hơn khi hover */
            --secondary-color: #1e3a8a;    /* Navy phụ */
            --accent-color: #64748b;
            --bg-color: #f9f7f3;           /* Nền ấm nhẹ, sang trọng */
            --text-color: #1e2937;
        }

        body {
            background: var(--bg-color);
            font-family: 'Inter', system-ui, sans-serif;
            color: var(--text-color);
        }

        /* Navbar */
        .navbar {
            background-color: #ffffff !important;
            box-shadow: 0 6px 25px rgba(74, 112, 67, 0.1);
            padding: 18px 0;
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.75rem;
            color: var(--primary-color) !important;
        }

        /* Hero Banner */
        .hero-banner {
            background: linear-gradient(135deg, #4a7043 0%, #3f5f38 100%);
            color: white;
            border-radius: 24px;
            padding: 75px 30px;
            margin: 35px 0 25px 0;
            box-shadow: 0 20px 45px rgba(74, 112, 67, 0.35);
            position: relative;
            overflow: hidden;
        }

        .hero-banner::before {
            content: '';
            position: absolute;
            top: -40%;
            right: -15%;
            width: 480px;
            height: 480px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
        }

        /* Promo Banner (Banner thêm) */
        .promo-banner {
            background: linear-gradient(135deg, #4a7043 0%, #5c8a54 100%);
            color: white;
            border-radius: 20px;
            padding: 35px 40px;
            margin-bottom: 40px;
            box-shadow: 0 15px 35px rgba(74, 112, 67, 0.28);
            position: relative;
            overflow: hidden;
        }

        .promo-banner::before {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -20%;
            width: 300px;
            height: 300px;
            background: rgba(255,255,255,0.18);
            border-radius: 50%;
        }

        /* Search */
        .search-container .input-group {
            box-shadow: 0 10px 30px rgba(74, 112, 67, 0.18);
            border-radius: 50px;
            overflow: hidden;
        }

        .search-container input {
            border: none;
            padding: 18px 24px;
            font-size: 1.1rem;
        }

        .search-container .input-group-text {
            border: none;
            background: white;
            padding: 0 26px;
            color: var(--primary-color);
        }

        /* Category Buttons */
        .category-btn {
            margin: 6px 5px;
            border-radius: 50px;
            padding: 12px 30px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 2px solid #e2e8f0;
            background: white;
            color: #475569;
        }

        .category-btn:hover,
        .category-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(74, 112, 67, 0.35);
        }

        /* Product Card */
        .product-card {
            border: none;
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: white;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.07);
        }

        .product-card:hover {
            transform: translateY(-15px);
            box-shadow: 0 25px 55px rgba(0, 0, 0, 0.15);
        }

        .product-img-wrapper {
            height: 255px;
            overflow: hidden;
            position: relative;
        }

        .product-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.7s ease;
        }

        .product-card:hover .product-img {
            transform: scale(1.15);
        }

        .card-body {
            padding: 24px;
        }

        .card-title {
            font-size: 1.18rem;
            font-weight: 600;
            line-height: 1.35;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 70px;
        }

        .price {
            font-size: 1.42rem;
            font-weight: 700;
            color: #e11d48;   /* Đỏ nổi bật */
        }

        .btn-cart {
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-cart:hover {
            background: var(--primary-hover);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(74, 112, 67, 0.4);
        }

        .badge-cart {
            position: absolute;
            top: -8px;
            right: -8px;
            font-size: 0.82rem;
            font-weight: 700;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html"> Shop NgaTràChi </a>
        <div class="d-flex align-items-center gap-3 ms-auto">
            <!-- Giỏ hàng -->
            <button onclick="viewCart()" class="btn btn-light position-relative rounded-circle p-3">
                <i class="fa-solid fa-cart-shopping fs-5 text-secondary"></i>
                <span id="cartCount" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger badge-cart">0</span>
            </button>

            <!-- Tài khoản -->
            <div class="dropdown">
                <button class="btn btn-outline-secondary rounded-pill px-4 py-2 d-flex align-items-center gap-2"
                        type="button" data-bs-toggle="dropdown">
                    <i class="fa-regular fa-user"></i>
                    <span id="userDisplay">Tài khoản</span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end shadow border-0 py-2" id="menuAccount">
                    <li><a class="dropdown-item py-2" href="login.html"><i class="fa-solid fa-right-to-bracket me-2"></i> Đăng nhập</a></li>
                    <li><a class="dropdown-item py-2" href="#"><i class="fa-solid fa-user-plus me-2"></i> Đăng ký</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item py-2 text-danger" href="#" onclick="logout()"><i class="fa-solid fa-right-from-bracket me-2"></i> Đăng xuất</a></li>
                    <li id="adminMenu" style="display: none;">
                        <hr class="dropdown-divider">
                        <a class="dropdown-item text-primary fw-bold" href="admin.html">
                            <i class="fa-solid fa-screwdriver-wrench me-2"></i> Vào trang quản trị
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</nav>

<div class="container">

    <!-- Banner mới (Promo Banner) -->
    <div class="promo-banner text-center">
        <div class="row align-items-center">
            <div class="col-lg-8">
                <h3 class="fw-bold mb-2">Bộ sưu tập Olive Nature 2026</h3>
                <p class="mb-0 fs-5 opacity-90">Mang thiên nhiên vào nhà với những món đồ gia dụng màu Olive sang trọng</p>
            </div>
            <div class="col-lg-4 text-lg-end mt-3 mt-lg-0">
                <a href="#" class="btn btn-light px-5 py-3 fw-semibold rounded-pill">
                    Khám phá ngay <i class="fa-solid fa-arrow-right ms-2"></i>
                </a>
            </div>
        </div>
    </div>

    <!-- Thanh tìm kiếm -->
    <div class="row justify-content-center mb-5">
        <div class="col-lg-8 col-md-10">
            <div class="input-group input-group-lg search-container rounded-pill">
                <span class="input-group-text"><i class="fas fa-search text-muted"></i></span>
                <input type="text" id="search" class="form-control" placeholder="Tìm kiếm sản phẩm..." onkeyup="searchProducts()">
            </div>
            <div id="resultCount" class="text-center mt-3 text-muted fw-medium"></div>
        </div>
    </div>

    <!-- Bộ lọc danh mục -->
    <div class="d-flex flex-wrap justify-content-center mb-5 gap-2" id="categoryFilter"></div>

    <!-- Danh sách sản phẩm -->
    <div class="row g-4" id="productList"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API = "http://localhost:8080/api/products";
    const BASE_IMAGE = "http://localhost:8080/images/products/";
    let products = [];
    let currentCategory = "all";
    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    function loadProducts() {
        fetch(API)
            .then(res => res.ok ? res.json() : [])
            .then(data => {
                products = data;
                renderCategoryButtons();
                searchProducts();
                updateCartCount();
            })
            .catch(err => {
                console.error("Lỗi tải sản phẩm:", err);
                document.getElementById("productList").innerHTML = `
                        <div class="col-12 text-center py-5">
                            <i class="fa-solid fa-wifi-slash fa-3x text-muted mb-3"></i>
                            <h5>Không thể tải dữ liệu sản phẩm</h5>
                        </div>`;
            });
    }

    function renderCategoryButtons() {
        const categories = new Set(["Tất cả"]);
        products.forEach(p => {
            if (p.category && p.category.name) categories.add(p.category.name);
        });
        let html = '';
        categories.forEach(cat => {
            const isActive = (cat === "Tất cả" && currentCategory === "all") || cat === currentCategory;
            html += `
                    <button class="btn category-btn ${isActive ? 'active' : ''}"
                            onclick="filterByCategory('${cat === "Tất cả" ? "all" : cat}')">
                        ${cat}
                    </button>`;
        });
        document.getElementById("categoryFilter").innerHTML = html;
    }

    function filterByCategory(cat) {
        currentCategory = cat;
        renderCategoryButtons();
        searchProducts();
    }

    function searchProducts() {
        const keyword = document.getElementById("search").value.toLowerCase().trim();
        let filtered = products;

        if (currentCategory !== "all") {
            filtered = filtered.filter(p => p.category && p.category.name === currentCategory);
        }

        if (keyword) {
            const keywords = keyword.split(" ").filter(k => k.length > 0);
            filtered = filtered.filter(p => {
                const text = `${p.name || ''} ${p.description || ''} ${p.category?.name || ''}`.toLowerCase();
                return keywords.every(kw => text.includes(kw));
            });
        }

        document.getElementById("resultCount").textContent = `Tìm thấy ${filtered.length} sản phẩm`;
        renderProductList(filtered);
    }

    function getImageUrl(imageUrl) {
        if (!imageUrl) return "https://via.placeholder.com/300x240?text=No+Image";
        if (imageUrl.startsWith("http")) return imageUrl;
        const clean = imageUrl.replace(/^uploads\//, "").replace(/^\/images\/products\//, "");
        return BASE_IMAGE + encodeURIComponent(clean);
    }

    function renderProductList(list) {
        let html = "";
        list.forEach(p => {
            const imgUrl = getImageUrl(p.imageUrl);
            html += `
                    <div class="col-xl-3 col-lg-4 col-md-6 col-sm-6">
                        <div class="product-card h-100">
                            <div class="product-img-wrapper">
                                <img src="${imgUrl}" class="product-img"
                                     onerror="this.src='https://via.placeholder.com/300x240?text=No+Image'">
                            </div>
                            <div class="card-body d-flex flex-column">
                                <h5 class="card-title mb-3" title="${p.name}">${p.name}</h5>
                                <div class="mt-auto">
                                    <p class="price mb-3">${Number(p.price).toLocaleString('vi-VN')} ₫</p>
                                    <button class="btn btn-cart w-100"
                                            onclick="addToCart(${p.productId}, '${p.name.replace(/'/g, "\\'")}', ${p.price})">
                                        <i class="fa-solid fa-cart-plus me-2"></i> Thêm vào giỏ
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>`;
        });

        document.getElementById("productList").innerHTML = html || `
                <div class="col-12 text-center py-5">
                    <i class="fa-regular fa-face-frown fa-3x text-muted mb-3 d-block"></i>
                    <h5 class="text-muted">Không tìm thấy sản phẩm nào phù hợp</h5>
                </div>`;
    }

    function addToCart(id, name, price) {
        const item = cart.find(i => i.id === id);
        if (item) item.quantity++;
        else cart.push({ id, name, price, quantity: 1 });

        localStorage.setItem("cart", JSON.stringify(cart));
        updateCartCount();
        alert(`✅Đã thêm "${name}" vào giỏ hàng!`);
    }

    function updateCartCount() {
        const count = cart.reduce((sum, item) => sum + item.quantity, 0);
        document.getElementById("cartCount").textContent = count;
    }

    function viewCart() {
        if (cart.length === 0) {
            alert("Giỏ hàng của bạn đang trống!");
            return;
        }
        alert("Chức năng xem giỏ hàng sẽ được phát triển sau.\n\nHiện tại có " + cart.length + " sản phẩm trong giỏ.");
    }

    function logout() {
        if (confirm("Bạn có chắc muốn đăng xuất?")) {
            localStorage.removeItem("currentLogin");
            location.reload();
        }
    }

    // Khởi tạo
    window.onload = () => {
        const user = JSON.parse(localStorage.getItem("currentLogin"));
        if (user) {
            document.getElementById("userDisplay").textContent = user.username || "Tài khoản";
            if (user.role === "ADMIN") {
                document.getElementById("adminMenu").style.display = "block";
            }
        }
        loadProducts();
    };
</script>
</body>
</html>
