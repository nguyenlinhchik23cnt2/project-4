<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quản lý Sản phẩm</title>
  <style>
    /* ── Reset & Base ───────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --border:  #2a2d3a;
      --accent:  #5b8dee;
      --danger:  #e05c5c;
      --success: #4caf7d;
      --text:    #e2e4ef;
      --muted:   #7a7f9a;
      --radius:  8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── Layout ─────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 18px; font-weight: 600; }
    header span { color: var(--accent); font-size: 22px; }

    main { max-width: 1200px; margin: 0 auto; padding: 24px 32px; }

    /* ── Toolbar ─────────────────────────────────────────── */
    .toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      align-items: center;
    }
    .toolbar input[type="text"] {
      flex: 1; min-width: 200px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); border-radius: var(--radius);
      padding: 8px 14px; font-size: 14px; outline: none;
      transition: border-color .2s;
    }
    .toolbar input:focus { border-color: var(--accent); }

    /* ── Buttons ─────────────────────────────────────────── */
    .btn {
      padding: 8px 18px;
      border: none; border-radius: var(--radius);
      font-size: 13px; font-weight: 600;
      cursor: pointer; transition: opacity .15s, transform .1s;
      white-space: nowrap;
    }
    .btn:hover  { opacity: .85; }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: var(--accent);  color: #fff; }
    .btn-danger  { background: var(--danger);  color: #fff; }
    .btn-ghost   { background: var(--border);  color: var(--text); }
    .btn-sm      { padding: 5px 12px; font-size: 12px; }

    /* ── Table ───────────────────────────────────────────── */
    .table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: var(--surface);
      padding: 11px 14px;
      text-align: left; font-size: 12px;
      text-transform: uppercase; letter-spacing: .05em;
      color: var(--muted); border-bottom: 1px solid var(--border);
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(91,141,238,.06); }
    tbody td { padding: 11px 14px; vertical-align: middle; }

    .badge {
      display: inline-block;
      padding: 2px 9px; border-radius: 99px;
      font-size: 11px; font-weight: 600;
    }
    .badge-active   { background: rgba(76,175,125,.18); color: var(--success); }
    .badge-inactive { background: rgba(224, 92, 92,.18); color: var(--danger); }

    /* ── Modal ───────────────────────────────────────────── */
    .overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.6); backdrop-filter: blur(4px);
      z-index: 100; align-items: center; justify-content: center;
    }
    .overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px; width: 540px; max-width: 95vw;
      max-height: 90vh; overflow-y: auto;
    }
    .modal h2 { font-size: 16px; margin-bottom: 20px; }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .form-grid .full { grid-column: 1 / -1; }

    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
    input, select, textarea {
      width: 100%;
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text); border-radius: var(--radius);
      padding: 8px 12px; font-size: 13px; outline: none;
      transition: border-color .2s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 70px; }

    .modal-actions {
      display: flex; justify-content: flex-end; gap: 8px; margin-top: 22px;
    }

    /* ── Toast ───────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      padding: 12px 20px; border-radius: var(--radius);
      font-size: 13px; font-weight: 600;
      color: #fff; opacity: 0;
      transition: opacity .3s, transform .3s;
      transform: translateY(8px);
      pointer-events: none; z-index: 999;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.success { background: var(--success); }
    #toast.error   { background: var(--danger); }

    /* ── Loading ─────────────────────────────────────────── */
    .loading { text-align: center; padding: 40px; color: var(--muted); }
  </style>
</head>
<body>

<header>
  <h1>Quản lý Sản phẩm</h1>
</header>

<main>
  <div class="toolbar">
    <input id="searchInput" type="text" placeholder="Tìm theo tên sản phẩm…" />
    <button class="btn btn-ghost"    onclick="loadProducts()">Tải lại</button>
    <button class="btn btn-primary"  onclick="openCreate()">+ Thêm mới</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
      <tr>
        <th>ID</th>
        <th>Tên sản phẩm</th>
        <th>Đơn vị</th>
        <th>Giá</th>
        <th>Tồn kho</th>
        <th>Trạng thái</th>
        <th>Thao tác</th>
      </tr>
      </thead>
      <tbody id="tableBody">
      <tr><td colspan="7" class="loading">Đang tải…</td></tr>
      </tbody>
    </table>
  </div>
</main>

<!-- Modal Create/Edit -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modalTitle">Thêm sản phẩm</h2>
    <div class="form-grid">
      <input type="hidden"  id="fId" />
      <div>
        <label>Tên sản phẩm *</label>
        <input id="fName" placeholder="Tên…" />
      </div>
      <div>
        <label>Đơn vị *</label>
        <input id="fUnit" placeholder="kg / cái / hộp…" />
      </div>
      <div>
        <label>Giá *</label>
        <input id="fPrice" type="number" min="0" placeholder="0" />
      </div>
      <div>
        <label>Category ID *</label>
        <input id="fCat" type="number" min="1" placeholder="1" />
      </div>
      <div>
        <label>Tồn kho</label>
        <input id="fStock" type="number" min="0" placeholder="0" />
      </div>
      <div>
        <label>Tồn kho tối thiểu</label>
        <input id="fMinStock" type="number" min="0" placeholder="10" />
      </div>
      <div>
        <label>Trạng thái</label>
        <select id="fStatus">
          <option value="active">active</option>
          <option value="inactive">inactive</option>
        </select>
      </div>
      <div>
        <label>Nổi bật</label>
        <select id="fFeatured">
          <option value="false">Không</option>
          <option value="true">Có</option>
        </select>
      </div>
      <div class="full">
        <label>Mô tả</label>
        <textarea id="fDesc" placeholder="Mô tả sản phẩm…"></textarea>
      </div>
      <div class="full">
        <label>URL hình ảnh</label>
        <input id="fImage" placeholder="https://…" />
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost"   onclick="closeModal()">Hủy</button>
      <button class="btn btn-primary" onclick="saveProduct()">Lưu</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  const API = 'http://localhost:8080/api/products';
  let debounceTimer;

  /* ── Tải danh sách ── */
  async function loadProducts(keyword = '') {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '<tr><td colspan="7" class="loading">Đang tải…</td></tr>';
    try {
      const url = keyword ? `${API}/search?q=${encodeURIComponent(keyword)}` : API;
      const res  = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      renderTable(data);
    } catch (e) {
      tbody.innerHTML = `<tr><td colspan="7" class="loading" style="color:#e05c5c">Lỗi: ${e.message}</td></tr>`;
    }
  }

  function renderTable(products) {
    const tbody = document.getElementById('tableBody');
    if (!products.length) {
      tbody.innerHTML = '<tr><td colspan="7" class="loading">Không có sản phẩm nào.</td></tr>';
      return;
    }
    tbody.innerHTML = products.map(p => `
      <tr>
        <td>${p.productId}</td>
        <td><strong>${esc(p.name)}</strong></td>
        <td>${esc(p.unit)}</td>
        <td>${Number(p.price).toLocaleString('vi-VN')} ₫</td>
        <td>${p.stockQty ?? 0}</td>
        <td><span class="badge badge-${p.status}">${p.status}</span></td>
        <td style="display:flex;gap:6px">
          <button class="btn btn-ghost btn-sm"   onclick="openEdit(${p.productId})">Sửa</button>
          <button class="btn btn-danger btn-sm"  onclick="deleteProduct(${p.productId})">Xóa</button>
        </td>
      </tr>`).join('');
  }

  /* ── Tìm kiếm debounce ── */
  document.getElementById('searchInput').addEventListener('input', e => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => loadProducts(e.target.value.trim()), 400);
  });

  /* ── Modal: Tạo mới ── */
  function openCreate() {
    document.getElementById('modalTitle').textContent = 'Thêm sản phẩm';
    clearForm();
    document.getElementById('overlay').classList.add('open');
  }

  /* ── Modal: Chỉnh sửa ── */
  async function openEdit(id) {
    try {
      const res = await fetch(`${API}/${id}`);
      if (!res.ok) throw new Error('Không tìm thấy sản phẩm');
      const p = await res.json();

      document.getElementById('modalTitle').textContent = `Sửa sản phẩm #${id}`;
      document.getElementById('fId').value       = p.productId;
      document.getElementById('fName').value     = p.name     || '';
      document.getElementById('fUnit').value     = p.unit     || '';
      document.getElementById('fPrice').value    = p.price    || 0;
      document.getElementById('fCat').value      = p.categoryId || '';
      document.getElementById('fStock').value    = p.stockQty ?? 0;
      document.getElementById('fMinStock').value = p.minStock ?? 10;
      document.getElementById('fStatus').value   = p.status   || 'active';
      document.getElementById('fFeatured').value = p.isFeatured ? 'true' : 'false';
      document.getElementById('fDesc').value     = p.description || '';
      document.getElementById('fImage').value    = p.imageUrl || '';

      document.getElementById('overlay').classList.add('open');
    } catch (e) { toast(e.message, 'error'); }
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
  }

  /* ── Lưu (tạo mới hoặc cập nhật) ── */
  async function saveProduct() {
    const id = document.getElementById('fId').value;
    const body = {
      name:        document.getElementById('fName').value.trim(),
      unit:        document.getElementById('fUnit').value.trim(),
      price:       parseFloat(document.getElementById('fPrice').value) || 0,
      categoryId:  parseInt(document.getElementById('fCat').value) || null,
      stockQty:    parseInt(document.getElementById('fStock').value) || 0,
      minStock:    parseInt(document.getElementById('fMinStock').value) || 10,
      status:      document.getElementById('fStatus').value,
      isFeatured:  document.getElementById('fFeatured').value === 'true',
      description: document.getElementById('fDesc').value.trim() || null,
      imageUrl:    document.getElementById('fImage').value.trim() || null,
    };

    if (!body.name || !body.unit || !body.categoryId) {
      toast('Vui lòng điền đủ thông tin bắt buộc (*)', 'error'); return;
    }

    try {
      const isEdit = !!id;
      const url    = isEdit ? `${API}/${id}` : API;
      const method = isEdit ? 'PUT' : 'POST';

      const res = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.message || `HTTP ${res.status}`);
      }

      closeModal();
      toast(isEdit ? 'Cập nhật thành công!' : 'Thêm thành công!', 'success');
      loadProducts();
    } catch (e) { toast('Lỗi: ' + e.message, 'error'); }
  }

  /* ── Xóa ── */
  async function deleteProduct(id) {
    if (!confirm(`Xóa sản phẩm #${id}?`)) return;
    try {
      const res = await fetch(`${API}/${id}`, { method: 'DELETE' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      toast(`Đã xóa sản phẩm #${id}`, 'success');
      loadProducts();
    } catch (e) { toast('Lỗi xóa: ' + e.message, 'error'); }
  }

  /* ── Helpers ── */
  function clearForm() {
    ['fId','fName','fUnit','fPrice','fCat','fStock','fMinStock','fDesc','fImage']
            .forEach(id => document.getElementById(id).value = '');
    document.getElementById('fStatus').value   = 'active';
    document.getElementById('fFeatured').value = 'false';
  }

  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `show ${type}`;
    setTimeout(() => { el.className = ''; }, 3000);
  }

  // Đóng modal khi click ra ngoài
  document.getElementById('overlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });

  /* ── Khởi động ── */
  loadProducts();
</script>
</body>
</html>
