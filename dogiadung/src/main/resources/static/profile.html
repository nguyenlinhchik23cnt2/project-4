<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TNC Shop - Thông Tin Cá Nhân</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        tncGreen: '#1e4620',
                        tncGreenHover: '#143016'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

<header class="bg-white shadow-sm border-b py-4 px-6 flex justify-between items-center">
    <div class="flex items-center space-x-3">
        <div class="bg-tncGreen p-2.5 rounded-xl text-white">
            <i class="fa-solid fa-house-chimney text-xl"></i>
        </div>
        <div>
            <span class="text-2xl font-black text-tncGreen">TNC Shop</span>
        </div>
    </div>
    <button onclick="logout()"
            class="px-5 py-2 text-red-600 hover:bg-red-50 rounded-xl flex items-center gap-2 font-medium">
        <i class="fas fa-sign-out-alt"></i> Đăng xuất
    </button>
</header>

<div class="max-w-3xl mx-auto mt-10 px-4">
    <div class="bg-white rounded-3xl shadow-xl overflow-hidden">

        <!-- Profile Header -->
        <div class="bg-tncGreen text-white p-8 text-center">
            <div id="avatar" class="w-32 h-32 mx-auto rounded-full border-4 border-white overflow-hidden bg-gray-200">
                <img id="avatar-img" src="https://via.placeholder.com/150" alt="Avatar"
                     class="w-full h-full object-cover">
            </div>
            <h1 id="full-name" class="text-3xl font-bold mt-4"></h1>
            <p id="username" class="text-green-100 mt-1"></p>
        </div>

        <div class="p-8">
            <h2 class="text-xl font-semibold text-gray-800 mb-6 flex items-center gap-2">
                <i class="fas fa-user-circle"></i> Thông Tin Cá Nhân
            </h2>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">Họ và tên</label>
                    <input id="display-name" type="text"
                           class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-tncGreen">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">Giới tính</label>
                    <select id="gender"
                            class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-tncGreen">
                        <option value="Nam">Nam</option>
                        <option value="Nữ">Nữ</option>
                        <option value="Khác">Khác</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">Ngày sinh</label>
                    <input id="birthdate" type="date"
                           class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-tncGreen">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">Email</label>
                    <input id="email" type="email"
                           class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-tncGreen">
                </div>

                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-600 mb-1">Số điện thoại</label>
                    <input id="phone" type="tel"
                           class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-tncGreen">
                </div>
            </div>

            <div class="mt-8 flex gap-4">
                <button onclick="saveProfile()"
                        class="flex-1 bg-tncGreen text-white py-4 rounded-2xl font-bold hover:bg-tncGreenHover transition flex items-center justify-center gap-2">
                    <i class="fas fa-save"></i> Lưu Thông Tin
                </button>
                <button onclick="window.location.href='index.html'"
                        class="flex-1 border border-gray-300 py-4 rounded-2xl font-bold hover:bg-gray-50 transition">
                    Về Trang Chủ
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    let currentUser = JSON.parse(localStorage.getItem('currentUser')) || {};

    function loadProfile() {
        // Hiển thị thông tin
        document.getElementById('full-name').textContent = currentUser.fullName || "Khách hàng mới";
        document.getElementById('username').textContent = "@" + (currentUser.username || "user");

        // Điền dữ liệu vào form
        document.getElementById('display-name').value = currentUser.fullName || "";
        document.getElementById('email').value = currentUser.email || "";
        document.getElementById('phone').value = currentUser.phone || "";
        document.getElementById('gender').value = currentUser.gender || "Nam";
        document.getElementById('birthdate').value = currentUser.birthdate || "";

        // Avatar
        const avatarImg = document.getElementById('avatar-img');
        avatarImg.src = currentUser.avatarUrl ||
            `https://via.placeholder.com/150/1e4620/ffffff?text=${currentUser.fullName ? currentUser.fullName.charAt(0).toUpperCase() : 'U'}`;
    }

    function saveProfile() {
        currentUser.fullName = document.getElementById('display-name').value;
        currentUser.email = document.getElementById('email').value;
        currentUser.phone = document.getElementById('phone').value;
        currentUser.gender = document.getElementById('gender').value;
        currentUser.birthdate = document.getElementById('birthdate').value;

        localStorage.setItem('currentUser', JSON.stringify(currentUser));

        alert("✅ Thông tin cá nhân đã được cập nhật thành công!");
    }

    function logout() {
        if (confirm("Bạn có chắc muốn đăng xuất?")) {
            localStorage.clear();
            window.location.href = 'login.html';
        }
    }

    // Khởi chạy trang
    window.onload = loadProfile;
</script>
</body>
</html>
