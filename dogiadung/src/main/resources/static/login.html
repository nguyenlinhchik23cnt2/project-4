<head>
    <meta charset="UTF-8">

    <title>TNC Shop - Đăng Nhập</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

        tailwind.config = {

<body class="bg-tncBg min-h-screen flex flex-col justify-between font-sans">

<header class="bg-white shadow-sm border-b border-gray-100 py-4 px-6 md:px-16 flex justify-between items-center">
    <div class="flex items-center space-x-3 cursor-pointer" onclick="window.location.href='index.html'">
        <div class="bg-tncGreen p-2.5 rounded-xl text-white">
            <i class="fa-solid fa-house-chimney text-xl"></i>
        </div>
        <div>
            <span class="text-2xl font-black text-tncGreen tracking-tight block leading-none">TNC Shop</span>
            <span class="text-[10px] text-gray-500 font-semibold tracking-widest uppercase">Đồ Gia Dụng Thông Minh</span>
        </div>
    </div>
</header>

<main class="flex-grow flex items-center justify-center px-4 py-12">
    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
        <div class="p-8 lg:p-12">
            <div id="alert-box" class="hidden mb-4 p-3 rounded-xl text-sm font-semibold text-center"></div>

            <h2 class="text-3xl font-extrabold text-tncGreen mb-2 tracking-tight">ĐĂNG NHẬP</h2>
            <p class="text-sm text-gray-500 mb-6">Vui lòng đăng nhập để tiếp tục</p>

            <form id="login-form" class="space-y-4">
                <input type="text" id="login-username" placeholder="Tên đăng nhập" required
                       class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-tncGreen transition">

                <div class="relative">
                    <input type="password" id="login-password" placeholder="Mật khẩu" required
                           class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-tncGreen transition">
                    <span class="absolute right-4 top-3.5 text-gray-400 hover:text-tncGreen cursor-pointer" onclick="togglePassword('login-password')">
                        <i class="fa-solid fa-eye" id="eye-login-password"></i>
                    </span>
                </div>

                <button type="submit" class="w-full bg-tncGreen text-white py-3 rounded-xl font-bold hover:bg-tncGreenHover transition">
                    Đăng Nhập
                </button>
            </form>

            <p class="text-sm text-center text-gray-600 mt-6">
                Chưa có tài khoản?
                <a href="register.html" class="text-tncGreen font-bold hover:underline">Đăng ký ngay</a>
            </p>
        </div>
    </div>
</main>
