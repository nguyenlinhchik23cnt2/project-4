<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Shop NgaTràChi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #4a7043;
            --primary-hover: #3f5f38;
            --primary-light: #5c8a54;
            --sidebar-bg: #1e293b;
            --content-bg: #f9f7f3;
        }

        body {
            background: var(--content-bg);
            font-family: 'Inter', system-ui, sans-serif;
        }

        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f9f7f3 0%, #f1ede6 100%);
        }

        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(74, 112, 67, 0.15);
            max-width: 420px;
            width: 100%;
            padding: 45px 40px;
        }

        .brand-title {
            font-size: 1.85rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .brand-subtitle {
            color: #64748b;
            font-size: 1.02rem;
            margin-bottom: 35px;
        }

        .form-label {
            font-weight: 600;
            color: #334155;
        }

        .form-control {
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(74, 112, 67, 0.15);
        }

        .input-group-text {
            background: white;
            border: 1px solid #e2e8f0;
            border-right: none;
            color: var(--primary-color);
        }

        .btn-login {
            background: var(--primary-color);
            border: none;
            padding: 14px;
            font-weight: 700;
            font-size: 1.1rem;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            background: var(--primary-hover);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(74, 112, 67, 0.3);
        }

        .message {
            min-height: 28px;
        }

        .text-muted a:hover {
            color: var(--primary-color) !important;
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="login-card">
        <div class="text-center mb-4">
            <h1 class="brand-title">Shop NgaTràChi</h1>
            <p class="brand-subtitle">Đồ gia dụng thông minh</p>
        </div>

        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Tên đăng nhập</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                    <input type="text" id="username" class="form-control" placeholder="Nhập username" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">Mật khẩu</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" id="password" class="form-control" placeholder="Nhập mật khẩu" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-3 btn-login">
                <i class="fa-solid fa-right-to-bracket me-2"></i> ĐĂNG NHẬP
            </button>
        </form>

        <div class="text-center mt-4">
            <a href="index.html" class="text-muted text-decoration-none">
                ← Quay về Trang chủ
            </a>
        </div>

        <div id="message" class="message mt-4 text-center fw-bold"></div>
    </div>
</div>

<script>
    const API_LOGIN = "http://localhost:8080/api/auth/login";

    document.getElementById("loginForm").addEventListener("submit", async function(e) {
        e.preventDefault();
        const messageDiv = document.getElementById("message");
        messageDiv.innerHTML = `<span class="text-info"><i class="fa-solid fa-spinner fa-spin me-2"></i>Đang đăng nhập...</span>`;

        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();

        try {
            const res = await fetch(API_LOGIN, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();

            if (res.ok) {
                localStorage.setItem("currentLogin", JSON.stringify(data));
                messageDiv.innerHTML = `<span class="text-success">
                        <i class="fa-solid fa-check-circle me-2"></i>
                        Đăng nhập thành công! Đang chuyển hướng...
                    </span>`;

                setTimeout(() => {
                    if (data.role === "ADMIN") {
                        window.location.href = "admin.html";
                    } else {
                        window.location.href = "index.html";
                    }
                }, 1000);
            } else {
                messageDiv.innerHTML = `<span class="text-danger">
                        <i class="fa-solid fa-xmark-circle me-2"></i>
                        Sai tài khoản hoặc mật khẩu!
                    </span>`;
            }
        } catch (err) {
            console.error(err);
            messageDiv.innerHTML = `<span class="text-danger">
                    <i class="fa-solid fa-wifi-slash me-2"></i>
                    Lỗi kết nối với server
                </span>`;
        }
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
