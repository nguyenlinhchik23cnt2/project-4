<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Khách hàng - GiaDungShop Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --sidebar-bg: #1e293b;
            --sidebar-hover: #334155;
            --primary-accent: #38bdf8;
            --content-bg: #f1f5f9;
        }

        body {
            background: var(--content-bg);
            font-family: 'Inter', sans-serif;
        }

        /* Sidebar */
        .sidebar {
            background: var(--sidebar-bg);
            color: white;
            min-height: 100vh;
            position: fixed;
            width: 250px;
            padding: 0;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        .sidebar-brand {
            padding: 25px 20px;
            font-size: 1.35rem;
            font-weight: 700;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            color: var(--primary-accent);
        }

        .sidebar a {
            color: #cbd5e1;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            text-decoration: none;
            transition: all 0.3s ease;
            margin: 4px 10px;
            border-radius: 8px;
        }

        .sidebar a i { width: 25px; font-size: 1.1rem; }

        .sidebar a:hover,
        .sidebar a.active {
            background: var(--sidebar-hover);
            color: white;
            transform: translateX(6px);
        }

        .sidebar a.active {
            background: var(--primary-accent);
            color: #0f172a;
            font-weight: 600;
        }

        /* Main Content */
        .main-content {
            margin-left: 250px;
            min-height: 100vh;
        }

        .top-nav {
            background: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            position: sticky;
            top: 0;
            z-index: 900;
        }

        .content-body {
            padding: 30px;
        }

        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 15px -2px rgba(0,0,0,0.08);
        }

        .card-header {
            background: white;
            border-bottom: 1px solid #e2e8f0;
            padding: 18px 24px;
            font-weight: 600;
            color: #1e293b;
        }

        .table th {
            background-color: #f8fafc;
            color: #475569;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .stt-col { width: 60px; text-align: center; font-weight: 700; color: #64748b; }
        .id-col { color: #64748b; font-size: 0.9rem; text-align: center; }

        .action-btns .btn {
            padding: 6px 10px;
            font-size: 0.9rem;
        }

        .search-box {
            max-width: 380px;
        }

        .table td {
            vertical-align: middle;
        }
    </style>
</head>

<body>

<!-- Kiểm tra quyền ADMIN -->
<script>
    const currentUser = JSON.parse(localStorage.getItem("currentLogin") || "{}");
    if (!currentUser || currentUser.role !== "ADMIN") {
        alert("Bạn không có quyền truy cập trang này!");
        window.location.href = "login.html";
        throw new Error("Unauthorized");
    }
</script>

<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-2 sidebar shadow">
            <div class="sidebar-brand">
                <i class="fa-solid fa-gauge-high me-2"></i> GIA DỤNG ADMIN
            </div>
            <div class="mt-3">
                <a href="admin.html">
                    <i class="fa-solid fa-chart-pie"></i> Tổng quan
                </a>
                <a href="product.html">
                    <i class="fa-solid fa-boxes-stacked"></i> Sản phẩm
                </a>
                <a href="category.html">
                    <i class="fa-solid fa-list-ul"></i> Danh mục
                </a>
                <a href="customer.html" class="active">
                    <i class="fa-solid fa-users"></i> Khách hàng
                </a>
                <a href="order.html">
                    <i class="fa-solid fa-cart-shopping"></i> Đơn hàng
                </a>
                <hr class="mx-3 opacity-25 my-3">
                <a href="index.html">
                    <i class="fa-solid fa-house-user"></i> Về Trang Chủ
                </a>
            </div>
        </div>

        <!-- Main Content -->
        <div class="col-md-10 main-content">
            <div class="top-nav">
                <h5 class="mb-0 fw-bold text-secondary">Quản lý Khách hàng</h5>
                <div class="d-flex align-items-center">
                    <span class="me-3 text-muted">Xin chào, <strong id="adminName">Admin</strong></span>
                    <a href="#" onclick="logout()" class="logout-btn">
                        <i class="fa-solid fa-right-from-bracket me-2"></i>Thoát
                    </a>
                </div>
            </div>

            <div class="content-body">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3 class="fw-bold text-dark">
                        <i class="fa-solid fa-users me-3 text-primary"></i> Quản lý Khách hàng
                    </h3>
                </div>

                <!-- Form thêm/sửa khách hàng -->
                <div class="card mb-4">
                    <div class="card-header">
                        <i class="fa-solid fa-user-pen me-2"></i> Thông tin Khách hàng
                    </div>
                    <div class="card-body">
                        <input type="hidden" id="customerId">

                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label fw-bold text-muted small">Họ và tên <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fa-regular fa-user"></i></span>
                                    <input type="text" id="fullName" class="form-control" placeholder="Nhập họ và tên">
                                </div>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label fw-bold text-muted small">Số điện thoại</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fa-solid fa-phone"></i></span>
                                    <input type="text" id="phone" class="form-control" placeholder="Nhập số điện thoại">
                                </div>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label fw-bold text-muted small">Email</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fa-regular fa-envelope"></i></span>
                                    <input type="email" id="email" class="form-control" placeholder="Nhập email">
                                </div>
                            </div>

                            <div class="col-md-12">
                                <label class="form-label fw-bold text-muted small">Địa chỉ</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fa-solid fa-location-dot"></i></span>
                                    <textarea id="address" class="form-control" rows="2" placeholder="Nhập địa chỉ chi tiết..."></textarea>
                                </div>
                            </div>
                        </div>

                        <div class="mt-4 d-flex gap-2">
                            <button onclick="addCustomer()" class="btn btn-success px-4">
                                <i class="fa-solid fa-user-plus me-2"></i> Thêm mới
                            </button>
                            <button onclick="updateCustomer()" class="btn btn-primary px-4">
                                <i class="fa-regular fa-floppy-disk me-2"></i> Cập nhật
                            </button>
                            <button onclick="clearForm()" class="btn btn-secondary px-4">
                                <i class="fa-solid fa-rotate-right me-2"></i> Làm mới
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Bảng danh sách khách hàng -->
                <div class="card">
                    <div class="card-header d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
                        <span><i class="fa-solid fa-address-book me-2"></i> Danh sách Khách hàng</span>

                        <div class="input-group search-box">
                            <span class="input-group-text"><i class="fa-solid fa-magnifying-glass"></i></span>
                            <input type="text" id="searchInput" class="form-control"
                                   placeholder="Tìm theo tên, SĐT, email..." onkeyup="searchCustomers()">
                        </div>
                    </div>

                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead>
                                <tr>
                                    <th class="text-center stt-col">STT</th>
                                    <th class="text-center">ID</th>
                                    <th>Họ và tên</th>
                                    <th>Số điện thoại</th>
                                    <th>Email</th>
                                    <th>Địa chỉ</th>
                                    <th>Ngày tạo</th>
                                    <th class="text-center">Hành động</th>
                                </tr>
                                </thead>
                                <tbody id="tableBody" class="text-muted"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const API = "http://localhost:8080/api/customers";
    let allCustomers = [];
    let currentEditId = null;

    function loadCustomers() {
        fetch(API)
            .then(res => res.ok ? res.json() : Promise.reject("Lỗi server"))
            .then(data => {
                allCustomers = data;
                renderCustomers(data);
            })
            .catch(err => {
                console.error(err);
                document.getElementById("tableBody").innerHTML = `
                    <tr>
                        <td colspan="8" class="text-center py-5 text-danger">
                            <i class="fa-solid fa-wifi-slash fa-2x mb-3 d-block"></i>
                            Không thể kết nối đến máy chủ
                        </td>
                    </tr>`;
            });
    }

    function renderCustomers(customers) {
        let html = "";
        customers.forEach((c, index) => {
            html += `
                <tr>
                    <td class="stt-col">${index + 1}</td>
                    <td class="id-col">#${c.customerId || c.id}</td>
                    <td class="fw-semibold">${c.fullName || ''}</td>
                    <td>${c.phone || '<span class="text-muted">—</span>'}</td>
                    <td>${c.email || '<span class="text-muted">—</span>'}</td>
                    <td class="text-truncate" style="max-width: 220px;" title="${c.address || ''}">
                        ${c.address || '<span class="text-muted">—</span>'}
                    </td>
                    <td class="small text-muted">
                        ${c.createdAt ? new Date(c.createdAt).toLocaleDateString('vi-VN') : '—'}
                    </td>
                    <td class="text-center action-btns">
                        <button class="btn btn-outline-primary btn-sm me-1"
                            onclick="editCustomer(${c.customerId || c.id})" title="Sửa">
                            <i class="fa-solid fa-pen"></i>
                        </button>
                        <button class="btn btn-outline-danger btn-sm"
                            onclick="deleteCustomer(${c.customerId || c.id})" title="Xóa">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </td>
                </tr>`;
        });

        document.getElementById("tableBody").innerHTML = html || `
            <tr>
                <td colspan="8" class="text-center py-5 text-muted">
                    <i class="fa-solid fa-users-slash fa-3x mb-3 d-block"></i>
                    Chưa có dữ liệu khách hàng
                </td>
            </tr>`;
    }

    function searchCustomers() {
        const keyword = document.getElementById("searchInput").value.toLowerCase().trim();
        if (!keyword) {
            renderCustomers(allCustomers);
            return;
        }

        const filtered = allCustomers.filter(c =>
            (c.fullName || '').toLowerCase().includes(keyword) ||
            (c.phone || '').includes(keyword) ||
            (c.email || '').toLowerCase().includes(keyword)
        );
        renderCustomers(filtered);
    }

    function addCustomer() {
        const customer = {
            fullName: document.getElementById("fullName").value.trim(),
            phone: document.getElementById("phone").value.trim(),
            email: document.getElementById("email").value.trim(),
            address: document.getElementById("address").value.trim()
        };

        if (!customer.fullName) return alert("Vui lòng nhập họ và tên khách hàng!");

        fetch(API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(customer)
        })
            .then(res => res.ok ? res.json() : Promise.reject())
            .then(() => {
                alert("✅ Thêm khách hàng thành công!");
                loadCustomers();
                clearForm();
            })
            .catch(() => alert("❌ Thêm khách hàng thất bại!"));
    }

    function editCustomer(id) {
        fetch(`${API}/${id}`)
            .then(res => res.ok ? res.json() : Promise.reject())
            .then(c => {
                currentEditId = c.customerId || c.id;
                document.getElementById("fullName").value = c.fullName || "";
                document.getElementById("phone").value = c.phone || "";
                document.getElementById("email").value = c.email || "";
                document.getElementById("address").value = c.address || "";

                window.scrollTo({ top: 0, behavior: 'smooth' });
            })
            .catch(() => alert("Không tìm thấy thông tin khách hàng!"));
    }

    function updateCustomer() {
        if (!currentEditId) return alert("Vui lòng chọn khách hàng cần sửa từ bảng!");

        const customer = {
            fullName: document.getElementById("fullName").value.trim(),
            phone: document.getElementById("phone").value.trim(),
            email: document.getElementById("email").value.trim(),
            address: document.getElementById("address").value.trim()
        };

        fetch(`${API}/${currentEditId}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(customer)
        })
            .then(res => res.ok ? res.json() : Promise.reject())
            .then(() => {
                alert("✅ Cập nhật thông tin khách hàng thành công!");
                loadCustomers();
                clearForm();
            })
            .catch(() => alert("❌ Cập nhật thất bại!"));
    }

    function deleteCustomer(id) {
        if (!confirm(`Bạn có chắc chắn muốn xóa khách hàng #${id}?\n\nHành động này không thể hoàn tác!`)) return;

        fetch(`${API}/${id}`, { method: "DELETE" })
            .then(res => {
                if (res.ok) {
                    alert("✅ Xóa khách hàng thành công!");
                    loadCustomers();
                } else {
                    alert("❌ Không thể xóa! Khách hàng này có thể đang có đơn hàng.");
                }
            })
            .catch(() => alert("❌ Lỗi kết nối khi xóa!"));
    }

    function clearForm() {
        currentEditId = null;
        document.getElementById("fullName").value = "";
        document.getElementById("phone").value = "";
        document.getElementById("email").value = "";
        document.getElementById("address").value = "";
    }

    function logout() {
        if (confirm("Bạn muốn đăng xuất?")) {
            localStorage.removeItem("currentLogin");
            window.location.href = "login.html";
        }
    }

    // Khởi tạo trang
    window.onload = () => {
        document.getElementById('adminName').innerText = currentUser.username || "Admin";
        loadCustomers();
    };
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
