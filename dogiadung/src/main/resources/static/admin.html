

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Quản trị - GiaDungShop</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --sidebar-bg: #1e293b;
            --sidebar-hover: #334155;
            --primary-accent: #38bdf8;
            --content-bg: #f1f5f9;
        }

        body {
            background: var(--content-bg);
            font-family: 'Inter', sans-serif;
        }

        /* Sidebar */
        .sidebar {
            background: var(--sidebar-bg);
            color: white;
            min-height: 100vh;
            position: fixed;
            width: 250px;
            padding: 0;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        .sidebar-brand {
            padding: 25px 20px;
            font-size: 1.35rem;
            font-weight: 700;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            color: var(--primary-accent);
            display: flex;
            align-items: center;
        }

        .sidebar a {
            color: #cbd5e1;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            text-decoration: none;
            transition: all 0.3s ease;
            margin: 4px 10px;
            border-radius: 8px;
        }

        .sidebar a i {
            width: 25px;
            font-size: 1.1rem;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background: var(--sidebar-hover);
            color: white;
            transform: translateX(6px);
        }

        .sidebar a.active {
            background: var(--primary-accent);
            color: #0f172a;
            font-weight: 600;
        }

        /* Main Content */
        .main-content {
            margin-left: 250px;
            padding: 0;
            min-height: 100vh;
        }

        .top-nav {
            background: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            position: sticky;
            top: 0;
            z-index: 900;
        }

        .content-body {
            padding: 30px;
        }

        /* Stat Cards */
        .stat-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 15px -2px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 10px 20px -4px rgba(0,0,0,0.12);
        }

        .icon-box {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
        }

        .logout-btn {
            color: #ef4444;
            border: 1px solid #fee2e2;
            padding: 8px 18px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: #fee2e2;
            color: #dc2626;
        }

        /* Responsive */
        @media (max-width: 992px) {
            .sidebar {
                width: 220px;
            }
            .main-content {
                margin-left: 220px;
            }
        }
    </style>
</head>

<body>

<!-- Kiểm tra quyền ADMIN -->
<script>
    const currentUser = JSON.parse(localStorage.getItem("currentLogin") || "{}");
    if (!currentUser || currentUser.role !== "ADMIN") {
        alert("Bạn không có quyền truy cập trang quản trị!");
        window.location.href = "login.html";
        // Dừng script còn lại
        throw new Error("Unauthorized");
    }
</script>

<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-2 sidebar shadow">
            <div class="sidebar-brand">

                GIA DỤNG ADMIN
            </div>
            <div class="mt-3">
                <a href="#" onclick="showSection(1)" class="active" id="menu1">
                    <i class="fa-solid fa-chart-pie"></i> Tổng quan
                </a>
                <a href="product.html" id="menu2">
                    <i class="fa-solid fa-boxes-stacked"></i> Sản phẩm
                </a>
                <a href="category.html" id="menu3">
                    <i class="fa-solid fa-list-ul"></i> Danh mục
                </a>
                <a href="order.html" id="menu4">
                    <i class="fa-solid fa-cart-shopping"></i> Đơn hàng
                </a>
                <hr class="mx-3 opacity-25 my-3">
                <a href="index.html">
                    <i class="fa-solid fa-house-user"></i> Về Trang Chủ
                </a>
            </div>
        </div>

        <!-- Main Content -->
        <div class="col-md-10 main-content">
            <div class="top-nav">
                <h5 class="mb-0 fw-bold text-secondary">Hệ thống quản lý</h5>
                <div class="d-flex align-items-center">
                    <span class="me-3 text-muted">Xin chào, <strong id="adminName">Admin</strong></span>
                    <a href="#" onclick="logout()" class="logout-btn">
                        <i class="fa-solid fa-right-from-bracket me-2"></i>Thoát
                    </a>
                </div>
            </div>

            <div class="content-body">
                <!-- Section 1: Tổng quan -->
                <div id="section1">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h3 class="fw-bold m-0">Báo cáo tóm tắt</h3>
                        <span class="badge bg-white text-dark shadow-sm p-2 text-muted">
                            Hôm nay: <span id="currentDate"></span>
                        </span>
                    </div>

                    <div class="row g-4" id="categoryStats"></div>
                </div>

                <!-- Section 2: Placeholder cho Sản phẩm -->
                <div id="section2" style="display:none;" class="text-center py-5">
                    <i class="fa-solid fa-boxes-stacked fa-4x text-light mb-3"></i>
                    <h2>Quản lý Sản phẩm</h2>
                    <p class="text-muted">Đang chuyển hướng tới trang quản lý sản phẩm...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Hiển thị ngày hiện tại
    document.getElementById('currentDate').innerText = new Date().toLocaleDateString('vi-VN', {
        year: 'numeric', month: 'long', day: 'numeric'
    });

    if (currentUser) {
        document.getElementById('adminName').innerText = currentUser.username || "Admin";
    }

    function showSection(n) {
        document.querySelectorAll('.content-body > div').forEach(div => {
            div.style.display = 'none';
        });
        document.getElementById(`section${n}`).style.display = 'block';

        // Cập nhật active menu
        document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
        const activeMenu = document.getElementById(`menu${n}`);
        if (activeMenu) activeMenu.classList.add('active');
    }

    // Dữ liệu mẫu (sau này thay bằng API)
    const categoryData = [
        { name: "Nhà bếp", count: 28, color: "#4361ee", icon: "fa-utensils" },
        { name: "Phòng ngủ", count: 12, color: "#2ec4b6", icon: "fa-bed" },
        { name: "Phòng khách", count: 9, color: "#3a86ff", icon: "fa-couch" },
        { name: "Cá nhân", count: 15, color: "#ff9f1c", icon: "fa-user-tie" },
        { name: "Thiết bị điện", count: 7, color: "#e63946", icon: "fa-bolt" }
    ];

    function renderCategoryStats() {
        let total = categoryData.reduce((sum, c) => sum + c.count, 0);

        let html = `
            <div class="col-12">
                <div class="card stat-card bg-primary text-white p-3">
                    <div class="card-body d-flex align-items-center">
                        <div class="icon-box bg-white text-primary me-3 shadow">
                            <i class="fa-solid fa-warehouse"></i>
                        </div>
                        <div>
                            <p class="mb-1 opacity-75 small">TỔNG KHO SẢN PHẨM</p>
                            <h2 class="fw-bold mb-0">${total}</h2>
                        </div>
                    </div>
                </div>
            </div>
        `;

        categoryData.forEach(cat => {
            html += `
                <div class="col-md-4 col-sm-6">
                    <div class="card stat-card h-100 p-3">
                        <div class="card-body d-flex align-items-center">
                            <div class="icon-box me-3" style="background: ${cat.color}15; color: ${cat.color}">
                                <i class="fa-solid ${cat.icon}"></i>
                            </div>
                            <div>
                                <p class="text-muted small mb-1 text-uppercase fw-bold">${cat.name}</p>
                                <h3 class="fw-bold mb-0">${cat.count}</h3>
                            </div>
                        </div>
                    </div>
                </div>`;
        });

        document.getElementById("categoryStats").innerHTML = html;
    }

    function logout() {
        if (confirm("Bạn có chắc chắn muốn đăng xuất?")) {
            localStorage.removeItem("currentLogin");
            window.location.href = "login.html";
        }
    }

    // Khởi tạo khi load trang
    window.onload = () => {
        showSection(1);
        renderCategoryStats();
    };
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
