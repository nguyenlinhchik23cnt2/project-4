<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Order Item</title>

    <!-- Bootstrap cho đẹp -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { padding: 30px; }
        table th { background: #f8f9fa; }
    </style>
</head>
<body>

<div class="container">
    <h2 class="mb-4">🛒 Quản lý Order Item</h2>

    <!-- FORM -->
    <div class="row g-2 mb-3">
        <div class="col">
            <input type="number" id="orderId" class="form-control" placeholder="Order ID">
        </div>
        <div class="col">
            <input type="number" id="productId" class="form-control" placeholder="Product ID">
        </div>
        <div class="col">
            <input type="number" id="quantity" class="form-control" placeholder="Số lượng">
        </div>
        <div class="col">
            <input type="number" id="price" class="form-control" placeholder="Đơn giá">
        </div>
        <div class="col">
            <button class="btn btn-success w-100" onclick="save()">💾 Lưu</button>
        </div>
        <div class="col">
            <button class="btn btn-secondary w-100" onclick="resetForm()">🔄 Reset</button>
        </div>
    </div>

    <p id="message"></p>

    <!-- TABLE -->
    <table class="table table-bordered table-hover">
        <thead>
        <tr>
            <th>Order ID</th>
            <th>Product ID</th>
            <th>Số lượng</th>
            <th>Đơn giá</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    const API = "http://localhost:8080/api/order-items";

    function showMessage(text, isError = false) {
        const msg = document.getElementById("message");
        msg.innerHTML = `<span class="${isError ? 'text-danger' : 'text-success'}">${text}</span>`;
        setTimeout(() => msg.innerHTML = "", 3000);
    }

    // ================= LOAD =================
    function loadData() {
        fetch(API)
            .then(res => res.json())
            .then(data => {
                let html = "";
                data.forEach(item => {
                    html += `
                    <tr>
                        <td>${item.orderId}</td>
                        <td>${item.productId}</td>
                        <td>${item.quantity}</td>
                        <td>${item.unitPrice}</td>
                        <td>
                            <button class="btn btn-warning btn-sm"
                                onclick="edit(${item.orderId}, ${item.productId})">✏️</button>
                            <button class="btn btn-danger btn-sm"
                                onclick="remove(${item.orderId}, ${item.productId})">🗑️</button>
                        </td>
                    </tr>`;
                });
                document.getElementById("tableBody").innerHTML = html;
            })
            .catch(() => showMessage("❌ Lỗi tải dữ liệu", true));
    }

    // ================= SAVE =================
    function save() {
        const orderId = document.getElementById("orderId").value;
        const productId = document.getElementById("productId").value;

        if (!orderId || !productId) {
            showMessage("⚠️ Nhập đầy đủ Order ID và Product ID", true);
            return;
        }

        const data = {
            orderId: parseInt(orderId),
            productId: parseInt(productId),
            quantity: parseInt(document.getElementById("quantity").value),
            unitPrice: parseFloat(document.getElementById("price").value)
        };

        fetch(`${API}/${orderId}/${productId}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        })
            .then(res => {
                if (!res.ok) throw new Error();
                showMessage("✅ Lưu thành công");
                loadData();
                resetForm();
            })
            .catch(() => showMessage("❌ Lỗi khi lưu", true));
    }

    // ================= EDIT =================
    function edit(orderId, productId) {
        fetch(`${API}/${orderId}/${productId}`)
            .then(res => res.json())
            .then(item => {
                document.getElementById("orderId").value = item.orderId;
                document.getElementById("productId").value = item.productId;
                document.getElementById("quantity").value = item.quantity;
                document.getElementById("price").value = item.unitPrice;
            });
    }

    // ================= DELETE =================
    function remove(orderId, productId) {
        if (confirm("Bạn chắc chắn muốn xóa?")) {
            fetch(`${API}/${orderId}/${productId}`, {
                method: "DELETE"
            })
                .then(() => {
                    showMessage("🗑️ Xóa thành công");
                    loadData();
                });
        }
    }

    // ================= RESET =================
    function resetForm() {
        document.getElementById("orderId").value = "";
        document.getElementById("productId").value = "";
        document.getElementById("quantity").value = "";
        document.getElementById("price").value = "";
    }

    // Load khi mở trang
    loadData();
</script>

</body>
</html>
