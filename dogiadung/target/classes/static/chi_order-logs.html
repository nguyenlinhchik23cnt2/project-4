<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TNC-Shop Quản lý Order Logs</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f9f4; padding: 20px; color: #2c3e50; }
        h1 { text-align: center; color: #1e7a5f; }
        .container { width: 1250px; margin: auto; }
        .card { background: white; padding: 22px; margin-bottom: 20px; border-radius: 16px; box-shadow: 0 6px 18px rgba(45, 212, 191, 0.08); }
        input, select, textarea { padding: 11px; margin: 5px 0; border: 1px solid #a1e2d1; border-radius: 8px; background: #f8fdfb; width: 100%; box-sizing: border-box; }
        button { padding: 11px 16px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; transition: all 0.3s; }
        button:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .btn-save { background: #34d399; }
        .btn-load { background: #22d3ee; }
        .btn-edit { background: #a3e635; color: #1f2937; }
        .btn-delete { background: #f87171; }
        .btn-reset { background: #94a3b8; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #34d399; color: white; padding: 14px; }
        th, td { padding: 12px; border-bottom: 1px solid #d1f0e6; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <h1> TNC-Shop Quản lý Order Logs</h1>

    <div class="card">
        <h4>Thêm / Cập nhật Log</h4>
        <input type="hidden" id="logId">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
            <div><label>Order ID</label><input type="number" id="orderId"></div>
            <div><label>Old Status</label>
                <select id="oldStatus">
                    <option value="">-- Chọn --</option>
                    <option value="PENDING">PENDING</option>
                    <option value="CONFIRMED">CONFIRMED</option>
                    <option value="PROCESSING">PROCESSING</option>
                    <option value="SHIPPED">SHIPPED</option>
                    <option value="DELIVERED">DELIVERED</option>
                    <option value="DONE">DONE</option>
                    <option value="CANCELLED">CANCELLED</option>
                </select>
            </div>
            <div><label>New Status *</label>
                <select id="newStatus">
                    <option value="">-- Chọn --</option>
                    <option value="PENDING">PENDING</option>
                    <option value="CONFIRMED">CONFIRMED</option>
                    <option value="PROCESSING">PROCESSING</option>
                    <option value="SHIPPED">SHIPPED</option>
                    <option value="DELIVERED">DELIVERED</option>
                    <option value="DONE">DONE</option>
                    <option value="CANCELLED">CANCELLED</option>
                </select>
            </div>
            <div><label>Changed By</label><input type="number" id="changedBy"></div>
        </div>
        <div style="margin-top:15px;">
            <label>Ghi chú</label>
            <textarea id="note" rows="3"></textarea>
        </div>
        <div style="margin-top:15px;">
            <button class="btn-save" onclick="createOrUpdateLog()"> Lưu Log</button>
            <button class="btn-reset" onclick="resetForm()">Reset</button>
        </div>
    </div>

    <div class="card">
        <button class="btn-load" onclick="loadAllLogs()"> Tải tất cả Logs</button>

        <table id="logsTable">
            <thead>
            <tr>
                <th>STT</th>
                <th>ID</th>
                <th>Order ID</th>
                <th>Old Status</th>
                <th>New Status</th>
                <th>Changed By</th>
                <th>Ghi chú</th>
                <th>Thời gian</th>
                <th>Hành động</th>
            </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    const API_URL = "http://localhost:8080/order-logs";

    async function loadAllLogs() {
        try {
            const res = await fetch(API_URL);
            let data = await res.json();


            data.sort((a, b) => a.id - b.id);
            renderTable(data);
        } catch (error) {
            alert("Không thể tải dữ liệu!");
        }
    }

    function renderTable(data) {
        const tbody = document.querySelector('#logsTable tbody');
        tbody.innerHTML = '';

        data.forEach((log, index) => {
            const row = document.createElement('tr');
            row.innerHTML = `
                    <td><strong>${index + 1}</strong></td>
                    <td>${log.id}</td>
                    <td><strong>${log.orderId}</strong></td>
                    <td>${log.oldStatus ? `<span style="background:#e2e8f0;padding:5px 10px;border-radius:20px;">${log.oldStatus}</span>` : ''}</td>
                    <td><span style="background:#34d399;color:white;padding:5px 10px;border-radius:20px;">${log.newStatus}</span></td>
                    <td>${log.changedBy || ''}</td>
                    <td>${log.note || '<i>Không có</i>'}</td>
                    <td>${log.updatedAt ? new Date(log.updatedAt).toLocaleString('vi-VN') : ''}</td>
                    <td>
                        <button class="btn-edit" onclick="editLog(${log.id})">Sửa</button>
                        <button class="btn-delete" onclick="deleteLog(${log.id})">Xóa</button>
                    </td>
                `;
            tbody.appendChild(row);
        });
    }


    async function createOrUpdateLog() { /* ... */
        const id = document.getElementById('logId').value;
        const log = {
            orderId: parseInt(document.getElementById('orderId').value) || 0,
            oldStatus: document.getElementById('oldStatus').value,
            newStatus: document.getElementById('newStatus').value,
            changedBy: document.getElementById('changedBy').value ? parseInt(document.getElementById('changedBy').value) : null,
            note: document.getElementById('note').value
        };

        try {
            let res;
            if (id) {
                res = await fetch(`${API_URL}/${id}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(log)});
            } else {
                res = await fetch(API_URL, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(log)});
            }
            if (res.ok) {
                alert(id ? "Cập nhật thành công!" : "Thêm mới thành công!");
                resetForm();
                loadAllLogs();
            }
        } catch(e) { alert("Lỗi!"); }
    }

    async function editLog(id) {
        const res = await fetch(`${API_URL}/${id}`);
        const log = await res.json();
        document.getElementById('logId').value = log.id;
        document.getElementById('orderId').value = log.orderId;
        document.getElementById('oldStatus').value = log.oldStatus || '';
        document.getElementById('newStatus').value = log.newStatus || '';
        document.getElementById('changedBy').value = log.changedBy || '';
        document.getElementById('note').value = log.note || '';
    }

    async function deleteLog(id) {
        if (confirm(`Xóa log ID ${id}?`)) {
            await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            loadAllLogs();
        }
    }

    function resetForm() {
        document.getElementById('logId').value = '';
        document.getElementById('orderId').value = '';
        document.getElementById('oldStatus').value = '';
        document.getElementById('newStatus').value = '';
        document.getElementById('changedBy').value = '';
        document.getElementById('note').value = '';
    }

    window.onload = loadAllLogs;
</script>
</body>
</html>
