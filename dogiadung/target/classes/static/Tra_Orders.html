<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TNC-Shop Quản Lý Đơn Hàng</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
    .status-badge { padding: 4px 12px; border-radius: 9999px; font-size: 0.875rem; font-weight: 500; }
  </style>
</head>
<body class="bg-gray-100">

<div class="max-w-7xl mx-auto p-6">
  <div class="flex justify-between items-center mb-8">
    <h1 class="text-3xl font-bold text-gray-800">TNC-Shop Quản Lý Đơn Hàng</h1>
    <button onclick="showCreateModal()"
            class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-xl flex items-center gap-2 transition">
      <i class="fas fa-plus"></i> Tạo đơn hàng mới
    </button>
  </div>

  <!-- Filters -->
  <div class="bg-white p-5 rounded-2xl shadow mb-6">
    <div class="grid grid-cols-1 md:grid-cols-6 gap-4">
      <input type="text" id="searchInput" placeholder="Tìm mã giảm giá, ghi chú..."
             class="border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500">

      <select id="statusFilter" class="border border-gray-300 rounded-xl px-4 py-3 focus:outline-none">
        <option value="">Tất cả trạng thái</option>
        <option value="pending">Chờ xử lý</option>
        <option value="confirmed">Đã xác nhận</option>
        <option value="shipped">Đang giao hàng</option>
        <option value="done">Hoàn thành</option>
        <option value="cancelled">Đã hủy</option>
      </select>

      <select id="payFilter" class="border border-gray-300 rounded-xl px-4 py-3 focus:outline-none">
        <option value="">Tất cả thanh toán</option>
        <option value="pending">Chưa thanh toán</option>
        <option value="paid">Đã thanh toán</option>
      </select>

      <button onclick="loadOrders()"
              class="bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-xl px-6 transition">
        <i ></i> Tìm kiếm
      </button>

      <button onclick="clearFilters()"
              class="bg-gray-500 hover:bg-gray-600 text-white font-medium rounded-xl px-6 transition">
        Xóa lọc
      </button>
    </div>
  </div>


  <div id="statusMessage" class="hidden mb-4 p-4 rounded-xl"></div>


  <div class="bg-white rounded-2xl shadow overflow-hidden">
    <table class="w-full">
      <thead class="bg-gray-50">
      <tr>
        <th class="px-6 py-4 text-left">Mã ĐH</th>
        <th class="px-6 py-4 text-left">Khách hàng</th>
        <th class="px-6 py-4 text-left">Ngày đặt</th>
        <th class="px-6 py-4 text-left">Trạng thái</th>
        <th class="px-6 py-4 text-left">Thanh toán</th>
        <th class="px-6 py-4 text-right">Tổng tiền</th>
        <th class="px-6 py-4 text-center">Thao tác</th>
      </tr>
      </thead>
      <tbody id="orderTable" class="divide-y text-sm"></tbody>
    </table>
  </div>
</div>

<!-- Modal -->
<div id="orderModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
  <div class="bg-white rounded-3xl w-full max-w-2xl mx-4 max-h-[92vh] overflow-hidden">
    <div class="p-6 border-b flex justify-between items-center">
      <h2 id="modalTitle" class="text-2xl font-bold text-gray-800">Tạo đơn hàng mới</h2>
      <button onclick="closeModal()" class="text-3xl text-gray-400 hover:text-gray-600">×</button>
    </div>

    <div class="p-6 overflow-y-auto max-h-[70vh]" id="modalBody">

    </div>

    <div class="p-6 border-t flex justify-end gap-4">
      <button onclick="closeModal()"
              class="px-8 py-3 text-gray-700 hover:bg-gray-100 rounded-2xl font-medium">Hủy</button>
      <button onclick="saveOrder()" id="saveButton"
              class="px-8 py-3 bg-blue-600 text-white rounded-2xl font-medium hover:bg-blue-700">Lưu đơn hàng</button>
    </div>
  </div>
</div>

<script>

  const BASE_URL = 'http://localhost:8080';

  let currentEditId = null;


  async function loadOrders() {
    showMessage("Đang tải dữ liệu...", "info");

    const status = document.getElementById('statusFilter').value;
    const payStatus = document.getElementById('payFilter').value;
    const search = document.getElementById('searchInput').value.trim();

    let url = `${BASE_URL}/api/orders`;

    if (status) url = `${BASE_URL}/api/orders/status/${status}`;
    else if (payStatus) url = `${BASE_URL}/api/orders/pay-status/${payStatus}`;

    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`Lỗi server: ${res.status}`);

      const orders = await res.json();
      let result = orders;

      if (search) {
        const keyword = search.toLowerCase();
        result = orders.filter(o =>
                (o.discCode && o.discCode.toLowerCase().includes(keyword)) ||
                (o.note && o.note.toLowerCase().includes(keyword)) ||
                String(o.orderId).includes(keyword)
        );
      }

      renderTable(result);
      showMessage(`Tìm thấy ${result.length} đơn hàng`, "success");
    } catch (error) {
      console.error(error);
      showMessage("Không kết nối được với server. Kiểm tra backend có đang chạy không?", "error");
      document.getElementById('orderTable').innerHTML = `
      <tr><td colspan="7" class="text-center py-12 text-red-500">
        <i class="fas fa-exclamation-triangle text-4xl mb-2"></i><br>
        Không thể tải dữ liệu
      </td></tr>`;
    }
  }

  function renderTable(orders) {
    const tbody = document.getElementById('orderTable');
    if (orders.length === 0) {
      tbody.innerHTML = `<tr><td colspan="7" class="text-center py-12 text-gray-500">Không có đơn hàng nào</td></tr>`;
      return;
    }

    tbody.innerHTML = orders.map(o => `
    <tr class="hover:bg-gray-50 transition">
      <td class="px-6 py-4 font-semibold">#${o.orderId}</td>
      <td class="px-6 py-4">${o.customerId}</td>
      <td class="px-6 py-4">${new Date(o.orderDate).toLocaleString('vi-VN')}</td>
      <td class="px-6 py-4">
        <span class="status-badge ${getStatusClass(o.status)}">${o.status}</span>
      </td>
      <td class="px-6 py-4">
        <span class="status-badge ${o.payStatus === 'paid' ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-700'}">
          ${o.payStatus}
        </span>
      </td>
      <td class="px-6 py-4 text-right font-semibold text-lg">
        ${Number(o.totalAmount || 0).toLocaleString('vi-VN')} ₫
      </td>
      <td class="px-6 py-4 text-center space-x-4">
        <button onclick="editOrder(${o.orderId})" class="text-blue-600 hover:text-blue-800">
          <i class="fas fa-edit"></i>
        </button>
        <button onclick="changeStatus(${o.orderId})" class="text-amber-600 hover:text-amber-800">
          <i class="fas fa-sync-alt"></i>
        </button>
        <button onclick="markAsPaid(${o.orderId})" class="text-green-600 hover:text-green-800">
          <i class="fas fa-check-circle"></i>
        </button>
      </td>
    </tr>
  `).join('');
  }


  function getStatusClass(status) {
    const map = {
      'pending': 'bg-yellow-100 text-yellow-700',
      'confirmed': 'bg-blue-100 text-blue-700',
      'shipped': 'bg-purple-100 text-purple-700',
      'done': 'bg-green-100 text-green-700',
      'cancelled': 'bg-red-100 text-red-700'
    };
    return map[status] || 'bg-gray-100 text-gray-700';
  }

  function showMessage(text, type = "info") {
    const msg = document.getElementById('statusMessage');
    let color = "bg-blue-100 text-blue-800";
    if (type === "success") color = "bg-green-100 text-green-800";
    if (type === "error") color = "bg-red-100 text-red-800";

    msg.className = `block ${color} p-4 rounded-2xl`;
    msg.textContent = text;
    setTimeout(() => msg.classList.add('hidden'), 5000);
  }


  function showCreateModal() {
    currentEditId = null;
    document.getElementById('modalTitle').textContent = "Tạo đơn hàng mới";
    document.getElementById('modalBody').innerHTML = generateForm();
    document.getElementById('orderModal').classList.remove('hidden');
  }

  async function editOrder(id) {
    try {
      const res = await fetch(`${BASE_URL}/api/orders/${id}`);
      if (!res.ok) throw new Error();
      const order = await res.json();

      currentEditId = id;
      document.getElementById('modalTitle').textContent = `Chỉnh sửa đơn hàng #${id}`;
      document.getElementById('modalBody').innerHTML = generateForm(order);
      document.getElementById('orderModal').classList.remove('hidden');
    } catch (e) {
      alert("Không tìm thấy đơn hàng!");
    }
  }

  function generateForm(data = {}) {
    return `
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium mb-1">ID Khách hàng <span class="text-red-500">*</span></label>
        <input type="number" id="customerId" value="${data.customerId || ''}" class="w-full border rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">ID User <span class="text-red-500">*</span></label>
        <input type="number" id="userId" value="${data.userId || ''}" class="w-full border rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500">
      </div>
      <div class="col-span-2">
        <label class="block text-sm font-medium mb-1">Địa chỉ giao hàng</label>
        <input type="text" id="shippingAddress" value="${data.shippingAddress || ''}" class="w-full border rounded-xl px-4 py-3">
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Tổng tiền (₫)</label>
        <input type="number" id="totalAmount" value="${data.totalAmount || 0}" class="w-full border rounded-xl px-4 py-3">
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Phí ship (₫)</label>
        <input type="number" id="shippingFee" value="${data.shippingFee || 0}" class="w-full border rounded-xl px-4 py-3">
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Mã giảm giá</label>
        <input type="text" id="discCode" value="${data.discCode || ''}" class="w-full border rounded-xl px-4 py-3">
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Loại giảm giá</label>
        <select id="discType" class="w-full border rounded-xl px-4 py-3">
          <option value="">Không áp dụng</option>
          <option value="percent" ${data.discType==='percent' ? 'selected' : ''}>Phần trăm</option>
          <option value="fixed" ${data.discType==='fixed' ? 'selected' : ''}>Số tiền cố định</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Giá trị giảm</label>
        <input type="number" id="discValue" value="${data.discValue || ''}" class="w-full border rounded-xl px-4 py-3">
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Phương thức TT</label>
        <select id="payMethod" class="w-full border rounded-xl px-4 py-3">
          <option value="COD" ${data.payMethod==='COD'?'selected':''}>COD</option>
          <option value="Banking" ${data.payMethod==='Banking'?'selected':''}>Ngân hàng</option>
          <option value="Momo" ${data.payMethod==='Momo'?'selected':''}>Momo</option>
          <option value="VNPay" ${data.payMethod==='VNPay'?'selected':''}>VNPay</option>
        </select>
      </div>
      <div class="col-span-2">
        <label class="block text-sm font-medium mb-1">Ghi chú</label>
        <textarea id="note" rows="3" class="w-full border rounded-xl px-4 py-3">${data.note || ''}</textarea>
      </div>
    </div>
  `;
  }

  function closeModal() {
    document.getElementById('orderModal').classList.add('hidden');
  }

  async function saveOrder() {
    const orderData = {
      customerId: parseInt(document.getElementById('customerId').value),
      userId: parseInt(document.getElementById('userId').value),
      shippingAddress: document.getElementById('shippingAddress').value,
      shippingFee: parseFloat(document.getElementById('shippingFee').value) || 0,
      totalAmount: parseFloat(document.getElementById('totalAmount').value) || 0,
      discCode: document.getElementById('discCode').value || null,
      discType: document.getElementById('discType').value || null,
      discValue: parseFloat(document.getElementById('discValue').value) || null,
      payMethod: document.getElementById('payMethod').value,
      note: document.getElementById('note').value || null
    };

    try {
      let res;
      if (currentEditId) {
        res = await fetch(`${BASE_URL}/api/orders/${currentEditId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(orderData)
        });
      } else {
        res = await fetch(`${BASE_URL}/api/orders`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(orderData)
        });
      }

      if (res.ok) {
        alert(currentEditId ? "Cập nhật thành công!" : "Tạo đơn hàng thành công!");
        closeModal();
        loadOrders();
      } else {
        alert("Lưu thất bại! Kiểm tra dữ liệu.");
      }
    } catch (err) {
      alert("Lỗi kết nối: " + err.message);
    }
  }


  async function changeStatus(id) {
    const status = prompt("Nhập trạng thái mới:\n(pending, confirmed, shipped, done, cancelled)", "confirmed");
    if (!status) return;

    try {
      const res = await fetch(`${BASE_URL}/api/orders/${id}/status?value=${status}`, { method: 'PATCH' });
      if (res.ok) loadOrders();
    } catch (e) { alert("Thất bại"); }
  }

  async function markAsPaid(id) {
    if (!confirm("Xác nhận đơn hàng này đã thanh toán?")) return;
    const txn = prompt("Nhập mã giao dịch:", "TXN" + Date.now());
    try {
      const res = await fetch(`${BASE_URL}/api/orders/${id}/pay?txnId=${txn}`, { method: 'PATCH' });
      if (res.ok) loadOrders();
    } catch (e) { alert("Thất bại"); }
  }

  function clearFilters() {
    document.getElementById('searchInput').value = '';
    document.getElementById('statusFilter').value = '';
    document.getElementById('payFilter').value = '';
    loadOrders();
  }

  // Load dữ liệu khi mở trang
  window.onload = () => {
    loadOrders();
  };
</script>
</body>
</html>
