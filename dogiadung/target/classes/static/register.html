<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TNC Shop - Đăng Ký</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = { theme: { extend: { colors: { tncGreen: '#1e4620', tncGreenHover: '#143016', tncBg: '#f4f7f4' } } } }
    </script>
</head>
<body class="bg-tncBg min-h-screen flex flex-col justify-between font-sans">

<header class="bg-white shadow-sm border-b border-gray-100 py-4 px-6 md:px-16 flex justify-between items-center">
    <div class="flex items-center space-x-3 cursor-pointer" onclick="window.location.href='index.html'">
        <div class="bg-tncGreen p-2.5 rounded-xl text-white">
            <i class="fa-solid fa-house-chimney text-xl"></i>
        </div>
        <div>
            <span class="text-2xl font-black text-tncGreen tracking-tight">TNC Shop</span>
        </div>
    </div>
</header>

<main class="flex-grow flex items-center justify-center px-4 py-12">
    <div class="max-w-4xl w-full flex flex-col md:flex-row bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100 min-h-[580px]">

        <div class="w-full md:w-2/5 bg-gradient-to-br from-tncGreen to-tncGreenHover text-white p-8 flex flex-col justify-between">
            <div>
                <h3 class="text-2xl font-black tracking-tight mb-2">Tạo tài khoản mới</h3>
                <p class="text-sm opacity-80">Tham gia TNC Shop để nhận nhiều ưu đãi.</p>
            </div>
        </div>

        <div class="w-full md:w-3/5 p-8 lg:p-12 flex flex-col justify-center">
            <div id="alert-message" class="hidden mb-6 p-4 rounded-xl text-sm font-semibold text-center"></div>
            <form id="form-register" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Tên đăng nhập *</label>
                        <input type="text" id="reg-username" required class="w-full px-4 py-3 border-2 border-gray-100 rounded-xl focus:border-tncGreen outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Họ và tên *</label>
                        <input type="text" id="reg-fullname" required class="w-full px-4 py-3 border-2 border-gray-100 rounded-xl focus:border-tncGreen outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Mật khẩu *</label>
                    <input type="password" id="reg-password" required class="w-full px-4 py-3 border-2 border-gray-100 rounded-xl focus:border-tncGreen outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Xác nhận mật khẩu *</label>
                    <input type="password" id="reg-confirm-password" required class="w-full px-4 py-3 border-2 border-gray-100 rounded-xl focus:border-tncGreen outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Email</label>
                    <input type="email" id="reg-email" class="w-full px-4 py-3 border-2 border-gray-100 rounded-xl focus:border-tncGreen outline-none">
                </div>
                <button type="submit" class="w-full bg-tncGreen text-white py-3.5 rounded-xl font-bold hover:bg-tncGreenHover transition">
                    ĐĂNG KÝ NGAY
                </button>
            </form>
        </div>
    </div>
</main>

<script>
    const API_BASE_URL = 'http://localhost:8080/api/auth';
    const alertBox = document.getElementById('alert-message');

    function showAlert(text, isSuccess) {
        alertBox.innerText = text;
        alertBox.className = `mb-6 p-4 rounded-xl text-sm font-semibold text-center ${isSuccess ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700'}`;
        alertBox.classList.remove('hidden');
        setTimeout(() => alertBox.classList.add('hidden'), 4000);
    }

    document.getElementById('form-register').addEventListener('submit', async (e) => {
        e.preventDefault();

        const username = document.getElementById('reg-username').value.trim();
        const fullName = document.getElementById('reg-fullname').value.trim();
        const password = document.getElementById('reg-password').value;
        const confirmPassword = document.getElementById('reg-confirm-password').value;
        const email = document.getElementById('reg-email').value.trim();

        if (password !== confirmPassword) {
            showAlert("Mật khẩu xác nhận không khớp!", false);
            return;
        }

        try {
            const response = await fetch(`${API_BASE_URL}/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: username,
                    fullName: fullName,
                    password: password,      // ← đúng tên getter/setter trong Entity
                    email: email
                })
            });

            const result = await response.json();
            if (response.ok && result.success) {
                showAlert("Đăng ký thành công! Đang chuyển hướng...", true);
                setTimeout(() => window.location.href = 'login.html', 1500);
            } else {
                showAlert(result.message || "Đăng ký thất bại!", false);
            }
        } catch (error) {
            showAlert("Không thể kết nối đến server!", false);
        }
    });
</script>
</body>
</html>
