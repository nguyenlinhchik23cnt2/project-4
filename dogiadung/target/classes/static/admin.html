<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>TNC Shop - Hệ Thống Quản Trị</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        // BẢO VỆ TRANG ADMIN: Kiểm tra quyền trước khi tải trang
        const userRole = localStorage.getItem('userRole');
        if (userRole !== 'staff' && userRole !== 'admin') {
            alert("Bạn không có quyền truy cập vào khu vực này!");
            window.location.href = '/nga-user.html'; // Đá về trang login
        }
    </script>
</head>
<body class="bg-gray-100 flex min-h-screen">

<div class="w-64 bg-slate-800 text-white flex flex-col justify-between">
    <div>
        <div class="p-5 bg-slate-900 flex items-center space-x-3">
            <i class="fa-solid fa-user-shield text-xl text-green-400"></i>
            <span class="font-bold text-lg tracking-wide">TNC ADMIN</span>
        </div>
        <nav class="p-4 space-y-1">
            <a href="#" class="flex items-center space-x-3 px-4 py-3 bg-slate-700 text-white rounded-xl font-medium transition">
                <i class="fa-solid fa-chart-line w-5 text-center"></i> <span>Tổng quan</span>
            </a>
            <a href="#" class="flex items-center space-x-3 px-4 py-3 hover:bg-slate-700 text-gray-300 hover:text-white rounded-xl font-medium transition">
                <i class="fa-solid fa-box w-5 text-center"></i> <span>Quản lý đồ gia dụng</span>
            </a>
            <a href="#" class="flex items-center space-x-3 px-4 py-3 hover:bg-slate-700 text-gray-300 hover:text-white rounded-xl font-medium transition">
                <i class="fa-solid fa-file-invoice-dollar w-5 text-center"></i> <span>Đơn hàng</span>
            </a>
        </nav>
    </div>

    <div class="p-4 border-t border-slate-700">
        <button onclick="logout()" class="w-full bg-red-600 hover:bg-red-700 text-white py-2 px-4 rounded-xl font-bold transition flex items-center justify-center space-x-2">
            <i class="fa-solid fa-right-from-bracket"></i>
            <span>Đăng xuất</span>
        </button>
    </div>
</div>

<div class="flex-grow flex flex-col">
    <header class="bg-white shadow-sm py-4 px-8 flex justify-between items-center">
        <h1 class="text-xl font-bold text-gray-700">Hệ thống điều khiển</h1>
        <div class="flex items-center space-x-3">
            <span class="text-sm text-gray-600 font-medium">Xin chào, <span id="admin-name" class="font-bold text-slate-800">Quản trị viên</span></span>
            <div class="w-8 h-8 bg-slate-300 rounded-full flex items-center justify-center text-slate-700 font-bold">A</div>
        </div>
    </header>

    <main class="p-8 flex-grow">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <h3 class="text-lg font-bold text-gray-800 mb-4">Chào mừng bạn quay trở lại!</h3>
            <p class="text-sm text-gray-500 mb-6">Đây là giao diện quản trị nội bộ dành riêng cho Staff/Admin của TNC Shop. Bạn có thể sử dụng menu bên trái để quản lý sản phẩm đồ gia dụng hoặc đơn đặt hàng.</p>
        </div>
    </main>
</div>

<script>
    const fullName = localStorage.getItem('fullName');
    if (fullName) {
        document.getElementById('admin-name').innerText = fullName;
    }

    function logout() {
        localStorage.clear();
        alert("Đã đăng xuất hệ thống quản trị!");
        window.location.href = '/login.html';
    }
</script>
</body>
</html>
